---
name: Apply Branch Protection
description: >-
  Apply branch protection rulesets from .github/config/branch-protection.json.
  No-op when enable_repo_settings or enable_branch_protection is not 'true'.
  Gracefully skips when the repository plan does not support rulesets.

inputs:
  owner:
    description: Repository owner (user or organization).
    required: true
  repo_name:
    description: Target repository name.
    required: true
  enable_repo_settings:
    description: Whether repository settings are enabled.
    required: true
  enable_branch_protection:
    description: Whether to apply branch protection rules.
    required: true
  gh_token:
    description: GitHub token with repository administration permissions.
    required: true

runs:
  using: composite
  steps:
    - name: Apply branch protection ruleset
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo_name }}
        ENABLE_SETTINGS: ${{ inputs.enable_repo_settings }}
        ENABLE_PROTECTION: ${{ inputs.enable_branch_protection }}
      run: |
        case "$ENABLE_SETTINGS/$ENABLE_PROTECTION" in
          "true/true") ;;
          *)
            echo "⏭️ Branch protection skipped" >> "$GITHUB_STEP_SUMMARY"
            exit 0
            ;;
        esac

        # Allow the repository to settle before applying rules.
        sleep 3

        RESPONSE=$(gh api \
          --method POST \
          -H "Accept: application/vnd.github+json" \
          /repos/"$OWNER"/"$REPO"/rulesets \
          --input ".github/config/branch-protection.json" 2>&1) || {
          EXIT_CODE=$?
          if echo "$RESPONSE" | grep -q "Upgrade to GitHub Pro"; then
            echo "⚠️ Branch protection rulesets require GitHub Pro or a public repository. Skipping." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Branch protection skipped: rulesets require GitHub Pro or a public repository."
            exit 0
          fi
          echo "$RESPONSE"
          exit "$EXIT_CODE"
        }
