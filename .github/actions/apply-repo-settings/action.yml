---
name: Apply Repository Settings
description: >-
  Apply repository settings, create environments, and enable Dependabot
  security features. No-op when enable_repo_settings is not 'true'.

inputs:
  owner:
    description: Repository owner (user or organization).
    required: true
  repo_name:
    description: Target repository name.
    required: true
  enable_repo_settings:
    description: Whether to apply repository settings and Dependabot configuration.
    required: true
  gh_token:
    description: GitHub token with repository administration permissions.
    required: true

runs:
  using: composite
  steps:
    - name: Apply repository settings and Dependabot
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo_name }}
        ENABLE: ${{ inputs.enable_repo_settings }}
      run: |
        case "$ENABLE" in
          "true") ;;
          *)
            echo "⏭️ Repository settings skipped (enable_repo_settings=false)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
            ;;
        esac

        # Apply repository settings from config file
        gh api \
          --method PATCH \
          -H "Accept: application/vnd.github+json" \
          /repos/"$OWNER"/"$REPO" \
          --input ".github/config/repo-settings.json"

        # Create dev environment (no wait, no reviewers required)
        gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          /repos/"$OWNER"/"$REPO"/environments/dev
        echo "✅ Development environment created" >> "$GITHUB_STEP_SUMMARY"

        # Create prod environment
        gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          /repos/"$OWNER"/"$REPO"/environments/prod
        echo "✅ Production environment created" >> "$GITHUB_STEP_SUMMARY"

        # Enable Dependabot vulnerability alerts
        gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          /repos/"$OWNER"/"$REPO"/vulnerability-alerts
        echo "✅ Vulnerability alerts enabled" >> "$GITHUB_STEP_SUMMARY"

        # Enable Dependabot automated security fixes
        gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          /repos/"$OWNER"/"$REPO"/automated-security-fixes
        echo "✅ Dependabot security updates enabled" >> "$GITHUB_STEP_SUMMARY"
