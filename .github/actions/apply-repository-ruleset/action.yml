---
name: Apply Repository Ruleset
description: >-
  Apply the default repository ruleset JSON to the target repository.
  Uses a skip-with-warning path for known plan limitations on rulesets.

inputs:
  owner:
    description: Repository owner (user or organization).
    required: true
  repo_name:
    description: Target repository name.
    required: true
  gh_token:
    description: GitHub token with repository administration permissions.
    required: true
  ruleset_file:
    description: Path to the ruleset JSON payload.
    required: false
    default: .github/config/ruleset-default.json

runs:
  using: composite
  steps:
    - name: Apply default repository ruleset
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo_name }}
        RULESET_FILE: ${{ inputs.ruleset_file }}
      run: |
        if [ ! -f "$RULESET_FILE" ]; then
          echo "::error::Ruleset file not found: $RULESET_FILE"
          exit 1
        fi

        if command -v jq >/dev/null 2>&1; then
          RULESET_NAME=$(jq -r '.name // "default"' "$RULESET_FILE")
        elif command -v python3 >/dev/null 2>&1; then
          RULESET_NAME=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('name','default'))" -- "$RULESET_FILE")
        else
          echo "::error::Neither jq nor python3 is available; cannot read ruleset name."
          exit 1
        fi

        # List failures (for example feature/plan restrictions) should not abort
        # the flow before create/update handling; treat them as no existing ruleset.
        EXISTING_RULESET_ID=$(gh api --paginate /repos/"$OWNER"/"$REPO"/rulesets --jq '.[] | select(.name == "'"$RULESET_NAME"'") | .id' 2>/dev/null || true)
        EXISTING_RULESET_ID=${EXISTING_RULESET_ID%%$'\n'*}

        if [ -n "$EXISTING_RULESET_ID" ]; then
          METHOD="PATCH"
          ENDPOINT="/repos/$OWNER/$REPO/rulesets/$EXISTING_RULESET_ID"
          ACTION_TEXT="updated"
        else
          METHOD="POST"
          ENDPOINT="/repos/$OWNER/$REPO/rulesets"
          ACTION_TEXT="applied"
        fi

        RESPONSE=$(gh api \
          --method "$METHOD" \
          -H "Accept: application/vnd.github+json" \
          "$ENDPOINT" \
          --input "$RULESET_FILE" 2>&1) || {
          EXIT_CODE=$?
          # Only skip silently for known plan-tier or feature-gate messages.
          # Generic 422 schema errors are surfaced as failures so payload bugs are visible.
          if echo "$RESPONSE" | grep -Eiq "Upgrade to GitHub Pro|public repositories with GitHub Free|rulesets are available|GitHub Advanced Security must be enabled|Copilot is not enabled|Copilot Business|Copilot Enterprise"; then
            echo "⚠️ Ruleset setup skipped: repository plan or required features are not enabled." >> "$GITHUB_STEP_SUMMARY"
            echo "Details: $RESPONSE" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Ruleset setup skipped due to plan/feature limitations. See step summary for details."
            exit 0
          fi
          echo "$RESPONSE"
          exit "$EXIT_CODE"
        }

        echo "✅ Repository ruleset $ACTION_TEXT" >> "$GITHUB_STEP_SUMMARY"
