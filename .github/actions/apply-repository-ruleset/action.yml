---
name: Apply Repository Ruleset
description: >-
  Apply the default repository ruleset JSON to the target repository.
  Uses a skip-with-warning path for known plan limitations on rulesets.

inputs:
  owner:
    description: Repository owner (user or organization).
    required: true
  repo_name:
    description: Target repository name.
    required: true
  gh_token:
    description: GitHub token with repository administration permissions.
    required: true
  ruleset_file:
    description: Path to the ruleset JSON payload.
    required: false
    default: .github/config/ruleset-default.json

runs:
  using: composite
  steps:
    - name: Apply default repository ruleset
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo_name }}
        RULESET_FILE: ${{ inputs.ruleset_file }}
      run: |
        if [ ! -f "$RULESET_FILE" ]; then
          echo "::error::Ruleset file not found: $RULESET_FILE"
          exit 1
        fi

        RULESET_NAME=$(jq -r '.name // "default"' "$RULESET_FILE")

        EXISTING_RULESET_ID=$(gh api --paginate /repos/"$OWNER"/"$REPO"/rulesets --jq '.[] | select(.name == "'"$RULESET_NAME"'") | .id' 2>/dev/null | head -n1)

        if [ -n "$EXISTING_RULESET_ID" ]; then
          METHOD="PATCH"
          ENDPOINT="/repos/$OWNER/$REPO/rulesets/$EXISTING_RULESET_ID"
          ACTION_TEXT="updated"
        else
          METHOD="POST"
          ENDPOINT="/repos/$OWNER/$REPO/rulesets"
          ACTION_TEXT="applied"
        fi

        RESPONSE=$(gh api \
          --method "$METHOD" \
          -H "Accept: application/vnd.github+json" \
          "$ENDPOINT" \
          --input "$RULESET_FILE" 2>&1) || {
          EXIT_CODE=$?
          if echo "$RESPONSE" | grep -Eiq "Upgrade to GitHub Pro|public repositories with GitHub Free|rulesets are available|Invalid request\. Invalid property /rules/|data matches no possible input|code_scanning|copilot_code_review|Advanced Security must be enabled|Copilot"; then
            echo "⚠️ Ruleset setup skipped: repository plan/features do not support this ruleset payload." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Ruleset setup skipped due to unsupported plan/features for one or more rules."
            exit 0
          fi
          echo "$RESPONSE"
          exit "$EXIT_CODE"
        }

        echo "✅ Repository ruleset $ACTION_TEXT" >> "$GITHUB_STEP_SUMMARY"
