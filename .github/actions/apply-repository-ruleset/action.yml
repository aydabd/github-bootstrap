---
name: Apply Repository Ruleset
description: >-
  Apply the default repository ruleset JSON to the target repository.
  Uses a skip-with-warning path for known plan limitations on rulesets.

inputs:
  owner:
    description: Repository owner (user or organization).
    required: true
  repo_name:
    description: Target repository name.
    required: true
  gh_token:
    description: GitHub token with repository administration permissions.
    required: true
  ruleset_profile:
    description: "Ruleset profile: default, minimal, or coderabbit. Ignored when ruleset_file is set."
    required: false
    default: default
  ruleset_file:
    description: Path to the ruleset JSON payload.
    required: false
    default: ""

outputs:
  ruleset_name:
    description: Name of the ruleset from the selected payload.
    value: ${{ steps.apply_ruleset.outputs.ruleset_name }}
  ruleset_id:
    description: Ruleset ID when created or updated.
    value: ${{ steps.apply_ruleset.outputs.ruleset_id }}
  ruleset_action:
    description: "Action taken: created, updated, or skipped."
    value: ${{ steps.apply_ruleset.outputs.ruleset_action }}
  ruleset_file:
    description: Ruleset file used by the action.
    value: ${{ steps.apply_ruleset.outputs.ruleset_file }}

runs:
  using: composite
  steps:
    - name: Apply default repository ruleset
      id: apply_ruleset
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo_name }}
        RULESET_PROFILE: ${{ inputs.ruleset_profile }}
        RULESET_FILE: ${{ inputs.ruleset_file }}
      run: |
        if [ -z "$RULESET_FILE" ]; then
          if [ "$RULESET_PROFILE" = "default" ]; then
            RULESET_FILE=".github/config/ruleset-default.json"
          elif [ "$RULESET_PROFILE" = "minimal" ]; then
            RULESET_FILE=".github/config/ruleset-minimal.json"
          elif [ "$RULESET_PROFILE" = "coderabbit" ]; then
            RULESET_FILE=".github/config/ruleset-coderabbit.json"
          else
            echo "::error::Invalid ruleset_profile '$RULESET_PROFILE'. Allowed: default, minimal, coderabbit."
            exit 1
          fi
        fi

        if [ ! -f "$RULESET_FILE" ]; then
          echo "::error::Ruleset file not found: $RULESET_FILE"
          exit 1
        fi

        if command -v jq >/dev/null 2>&1; then
          RULESET_NAME=$(jq -r '.name // "default"' "$RULESET_FILE")
        elif command -v python3 >/dev/null 2>&1; then
          RULESET_NAME=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('name','default'))" -- "$RULESET_FILE")
        else
          echo "::error::Neither jq nor python3 is available; cannot read ruleset name."
          exit 1
        fi
        echo "ruleset_name=$RULESET_NAME" >> "$GITHUB_OUTPUT"
        echo "ruleset_file=$RULESET_FILE" >> "$GITHUB_OUTPUT"

        # List failures (for example feature/plan restrictions) should not abort
        # the flow before create/update handling; treat them as no existing ruleset.
        EXISTING_RULESET_ID=$(gh api --paginate /repos/"$OWNER"/"$REPO"/rulesets --jq '.[] | [.id, .name] | @tsv' 2>/dev/null | while IFS=$'\t' read -r id name; do
          if [ "$name" = "$RULESET_NAME" ]; then
            printf '%s\n' "$id"
            break
          fi
        done || true)
        EXISTING_RULESET_ID=${EXISTING_RULESET_ID%%$'\n'*}

        if [ -n "$EXISTING_RULESET_ID" ]; then
          METHOD="PATCH"
          ENDPOINT="/repos/$OWNER/$REPO/rulesets/$EXISTING_RULESET_ID"
          ACTION_TEXT="updated"
          ACTION_OUTPUT="updated"
        else
          METHOD="POST"
          ENDPOINT="/repos/$OWNER/$REPO/rulesets"
          ACTION_TEXT="applied"
          ACTION_OUTPUT="created"
        fi

        RESPONSE=$(gh api \
          --method "$METHOD" \
          -H "Accept: application/vnd.github+json" \
          "$ENDPOINT" \
          --input "$RULESET_FILE" 2>&1) || {
          EXIT_CODE=$?
          # Only skip silently for known plan-tier or feature-gate messages.
          # Generic 422 schema errors are surfaced as failures so payload bugs are visible.
          if echo "$RESPONSE" | grep -Eiq "Upgrade to GitHub Pro|public repositories with GitHub Free|rulesets are available|GitHub Advanced Security must be enabled|Copilot is not enabled|Copilot Business|Copilot Enterprise"; then
            echo "ruleset_id=" >> "$GITHUB_OUTPUT"
            echo "ruleset_action=skipped" >> "$GITHUB_OUTPUT"
            echo "⚠️ Ruleset setup skipped: repository plan or required features are not enabled." >> "$GITHUB_STEP_SUMMARY"
            echo "Details: $RESPONSE" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Ruleset setup skipped due to plan/feature limitations. See step summary for details."
            exit 0
          fi
          echo "$RESPONSE"
          exit "$EXIT_CODE"
        }

        if [ -n "$EXISTING_RULESET_ID" ]; then
          RULESET_ID="$EXISTING_RULESET_ID"
        else
          RULESET_ID="$(printf '%s' "$RESPONSE" | jq -r '.id // ""')"
        fi
        echo "ruleset_id=$RULESET_ID" >> "$GITHUB_OUTPUT"
        echo "ruleset_action=$ACTION_OUTPUT" >> "$GITHUB_OUTPUT"

        echo "✅ Repository ruleset $ACTION_TEXT" >> "$GITHUB_STEP_SUMMARY"
