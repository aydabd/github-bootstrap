---
name: Apply Security Settings
description: Enable selected repository security features from JSON configuration.

inputs:
  owner:
    description: Repository owner (user or organization).
    required: true
  repo_name:
    description: Target repository name.
    required: true
  security_file:
    description: Path to the security settings JSON file.
    required: false
    default: .github/config/security-default.json
  gh_token:
    description: GitHub token with repository administration permissions.
    required: true

outputs:
  enabled_count:
    description: Number of security features enabled.
    value: ${{ steps.apply_security_settings.outputs.enabled_count }}
  skipped_count:
    description: Number of security features disabled by config.
    value: ${{ steps.apply_security_settings.outputs.skipped_count }}
  unsupported_count:
    description: Number of best-effort security features unavailable on the target repository.
    value: ${{ steps.apply_security_settings.outputs.unsupported_count }}

runs:
  using: composite
  steps:
    - name: Apply security settings
      id: apply_security_settings
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        OWNER: ${{ inputs.owner }}
        REPO: ${{ inputs.repo_name }}
        SECURITY_FILE: ${{ inputs.security_file }}
      run: |
        set -euo pipefail

        if [ ! -f "$SECURITY_FILE" ]; then
          echo "::error::Security settings file not found: $SECURITY_FILE"
          exit 1
        fi
        jq -e 'type == "object"' "$SECURITY_FILE" >/dev/null

        enabled_count=0
        skipped_count=0
        unsupported_count=0

        apply_put_feature() {
          local key="$1"
          local endpoint="$2"
          local value
          value="$(jq -r --arg key "$key" '.[$key] // "disabled"' "$SECURITY_FILE")"
          if [ "$value" = "disabled" ]; then
            skipped_count=$((skipped_count + 1))
            echo "⏭️ $key disabled by config" >> "$GITHUB_STEP_SUMMARY"
            return 0
          fi
          if gh api --method PUT -H "Accept: application/vnd.github+json" "$endpoint" >/dev/null 2>&1; then
            enabled_count=$((enabled_count + 1))
            echo "✅ $key enabled" >> "$GITHUB_STEP_SUMMARY"
            return 0
          fi
          if [ "$value" = "best-effort" ]; then
            unsupported_count=$((unsupported_count + 1))
            echo "⚠️ $key unsupported or unavailable for this repository" >> "$GITHUB_STEP_SUMMARY"
            return 0
          fi
          echo "::error::Failed to enable $key"
          return 1
        }

        apply_security_and_analysis() {
          local key="$1"
          local api_key="$2"
          local value
          value="$(jq -r --arg key "$key" '.[$key] // "disabled"' "$SECURITY_FILE")"
          if [ "$value" = "disabled" ]; then
            skipped_count=$((skipped_count + 1))
            echo "⏭️ $key disabled by config" >> "$GITHUB_STEP_SUMMARY"
            return 0
          fi

          payload="$(mktemp)"
          jq -n --arg api_key "$api_key" '{security_and_analysis: {($api_key): {status: "enabled"}}}' > "$payload"
          if gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/$OWNER/$REPO" \
            --input "$payload" >/dev/null 2>&1; then
            enabled_count=$((enabled_count + 1))
            echo "✅ $key enabled" >> "$GITHUB_STEP_SUMMARY"
            rm -f "$payload"
            return 0
          fi
          rm -f "$payload"
          if [ "$value" = "best-effort" ]; then
            unsupported_count=$((unsupported_count + 1))
            echo "⚠️ $key unsupported or unavailable for this repository" >> "$GITHUB_STEP_SUMMARY"
            return 0
          fi
          echo "::error::Failed to enable $key"
          return 1
        }

        apply_put_feature "vulnerability_alerts" "/repos/$OWNER/$REPO/vulnerability-alerts"
        apply_put_feature "automated_security_fixes" "/repos/$OWNER/$REPO/automated-security-fixes"
        apply_security_and_analysis "dependency_graph" "dependency_graph"
        apply_security_and_analysis "secret_scanning" "secret_scanning"
        apply_security_and_analysis "secret_scanning_push_protection" "secret_scanning_push_protection"
        apply_security_and_analysis "private_vulnerability_reporting" "private_vulnerability_reporting"

        echo "enabled_count=$enabled_count" >> "$GITHUB_OUTPUT"
        echo "skipped_count=$skipped_count" >> "$GITHUB_OUTPUT"
        echo "unsupported_count=$unsupported_count" >> "$GITHUB_OUTPUT"
