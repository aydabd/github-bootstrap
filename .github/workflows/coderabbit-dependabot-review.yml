name: CodeRabbit Review for Automation PRs

on:
  pull_request_target:
    types:
      - opened
      - labeled
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  request-coderabbit-review:
    name: Request CodeRabbit review for automation PRs
    if: >-
      ${{
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        (
          github.event.pull_request.head.ref == 'chore/weekly-tooling-updates' &&
          contains(github.event.pull_request.labels.*.name, 'automation') &&
          contains(github.event.pull_request.labels.*.name, 'dependencies')
        ) ||
        (
          startsWith(github.event.pull_request.head.ref, 'release-please--branches--') &&
          contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Request CodeRabbit review comment (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          existing_comment_id="$({
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("@coderabbitai review"))) | .id'
          } | head -n 1 || true)"

          if [ -n "${existing_comment_id}" ]; then
            echo "CodeRabbit review request comment already exists: ${existing_comment_id}"
            exit 0
          fi

          gh pr comment "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body "@coderabbitai review"
          echo "Posted CodeRabbit review request comment on PR #${PR_NUMBER}."
