---
name: Delete repository

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Type the full repository name (owner/repo) to confirm deletion"
        required: true
        type: string
      force:
        description: "Set to true to actually delete the repository. If false, the workflow will run as a dry-run."
        required: false
        default: "false"
        type: boolean
      gh_token:
        description: >-
          Personal Access Token with delete_repo scope.
          If omitted, the repository secret GH_PAT is used.
          Use this when you do not have permission to set repository secrets.
        required: false
        type: string

jobs:
  delete-repo:
    runs-on: ubuntu-latest
    # This workflow uses a personal access token (GH_PAT or gh_token input) with repo deletion permissions.
    # Create a secret named GH_PAT with `delete_repo` scope (or an admin token) in the repository where you run this,
    # or provide the token directly via the 'gh_token' workflow input.
    steps:
      - name: Dry-run check
        run: |
          if [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "Force flag is not set. This is a dry run. No deletion will occur."
            echo "To actually delete, re-run the workflow and set 'force' to true."
            exit 0
          fi

      - name: Resolve GitHub token
        id: resolve-token
        env:
          INPUT_TOKEN: ${{ github.event.inputs.gh_token }}
          SECRET_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TOKEN="${INPUT_TOKEN:-$SECRET_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::No GitHub token available. Provide the 'gh_token' input or set the GH_PAT repository secret."
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Delete repository via REST API
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          REPO_FULL: ${{ inputs.repo }}
        run: |
          echo "Deleting repository: $REPO_FULL"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO_FULL")

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "Repository deleted successfully."
          else
            echo "Failed to delete repository. HTTP status: $HTTP_STATUS"
            # Provide help for common failures
            if [ "$HTTP_STATUS" = "403" ]; then
              echo "403 Forbidden — ensure the token has the delete_repo scope and the actor has sufficient permissions."
            elif [ "$HTTP_STATUS" = "404" ]; then
              echo "404 Not Found — repository may not exist or token lacks access."
            fi
            exit 1
          fi
