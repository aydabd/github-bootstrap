name: Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-micromamba:
    name: lint (micromamba)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup provider (micromamba)
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: github-bootstrap
          cache-environment: true
          cache-downloads: true

      - name: Cache pre-commit hook environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run lint (check mode)
        shell: bash
        run: LINT_MODE=check ENV_MANAGER=micromamba MICROMAMBA="$(command -v micromamba)" make lint

  lint-mise:
    name: lint (mise)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup provider (mise)
        uses: ./.github/actions/setup-lint-mise

      - name: Cache pre-commit hook environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run lint (check mode)
        shell: bash
        run: LINT_MODE=check ENV_MANAGER=mise make lint

  lint-system:
    name: lint (system)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup provider (system)
        uses: ./.github/actions/setup-lint-system

      - name: Cache pre-commit hook environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run lint (check mode)
        shell: bash
        run: LINT_MODE=check ENV_MANAGER=system make lint
