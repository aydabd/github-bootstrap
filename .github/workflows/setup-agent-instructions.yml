name: Setup Agent Instructions

on:
  workflow_dispatch:
    inputs:
      repo_owner:
        description: "Target owner - GitHub user or organization"
        required: true
        type: string
      repo_name:
        description: "Existing repository name"
        required: true
        type: string
      agent_provider:
        description: "AI agent provider"
        required: true
        default: copilot
        type: choice
        options:
          - copilot
          - claude
          - cursor
          - windsurf
          - codex
          - all
      mode:
        description: "Agent instruction file apply mode"
        required: false
        default: pull-request
        type: choice
        options:
          - plan
          - pull-request
          - direct
      app_id:
        description: "GitHub App ID for App-based auth"
        required: false
        type: string
      app_owner:
        description: "Owner whose GitHub App installation token should be used"
        required: false
        type: string
      allowed_repo_owners:
        description: "Optional comma-separated allowlist of target owners"
        required: false
        type: string
  workflow_call:
    inputs:
      repo_owner:
        required: true
        type: string
      repo_name:
        required: true
        type: string
      agent_provider:
        required: true
        type: string
      mode:
        required: false
        default: pull-request
        type: string
      app_id:
        required: false
        type: string
      app_owner:
        required: false
        type: string
      allowed_repo_owners:
        required: false
        type: string
    secrets:
      GH_PAT:
        required: false
      app_private_key:
        required: false
      BOOTSTRAP_APP_PRIVATE_KEY:
        required: false

jobs:
  setup-agent-instructions:
    uses: ./.github/workflows/setup-existing-repository.yml
    with:
      repo_owner: ${{ inputs.repo_owner }}
      repo_name: ${{ inputs.repo_name }}
      agent_provider: ${{ inputs.agent_provider }}
      agent_mode: ${{ inputs.mode }}
      app_id: ${{ inputs.app_id }}
      app_owner: ${{ inputs.app_owner || inputs.repo_owner }}
      allowed_repo_owners: ${{ inputs.allowed_repo_owners }}
    secrets: inherit
