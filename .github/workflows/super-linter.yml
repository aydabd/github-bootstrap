---
# Lint and auto-format code using native tools (no Docker overhead).
#
# Pull-request runs (two phases):
#   1. Auto-fix: Prettier + markdownlint (markdownlint-cli) fix formatting,
#      commit result back with "[skip ci]" so this workflow is NOT re-triggered.
#   2. Validate: Run all linters; fail the PR if anything is still wrong.
#
# Push-to-main / workflow_dispatch runs: validate only (no commits).
#
# Re-trigger question: auto-fix commits use "[skip ci]" in the subject line,
# which causes GitHub Actions to skip all workflows for that commit, so there
# is no infinite loop.  The author's next push will trigger a fresh run.
name: Super-Linter

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to the same PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  lint-and-format:
    name: Lint and Auto-format Code
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # Full history so commitlint can walk the full PR range.
          fetch-depth: 0
          # Check out the actual PR branch so auto-fix commits can be pushed back.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git Config
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Tool installation ──────────────────────────────────────────────────────
      # Native tools install in ~20 s; no Docker image pull (~72 s) needed.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Node.js lint tools
        run: |
          npm install --global --quiet \
            markdownlint-cli \
            prettier \
            @commitlint/cli \
            @commitlint/config-conventional \
            textlint \
            textlint-rule-terminology \
            editorconfig-checker

      - name: Install Python tools
        run: pip install --quiet pre-commit

      # ── Auto-fix pass (PR only) ────────────────────────────────────────────────
      # Formatters run first so the validation pass always sees clean files.
      # Fixes are committed back with "[skip ci]" to prevent an infinite loop.
      # The "|| true" on auto-fix steps is intentional: these are best-effort
      # formatters; unfixable issues (e.g. parse errors) are caught in the
      # validation pass below, which does NOT use "|| true".
      - name: Auto-fix Prettier (Markdown / YAML / JSON)
        if: github.event_name == 'pull_request'
        run: |
          prettier --write "**/*.{md,yaml,yml,json}" \
            --ignore-path .gitignore || true

      - name: Auto-fix markdownlint
        if: github.event_name == 'pull_request'
        run: |
          markdownlint --fix "**/*.md" \
            --config .github/linters/.markdownlint.json || true

      - name: Auto-fix Terraform fmt
        if: github.event_name == 'pull_request'
        run: |
          # Only run if the terraform directory exists.
          [[ -d ./terraform ]] && terraform fmt -recursive ./terraform || true

      - name: Commit Auto-fixes
        if: github.event_name == 'pull_request'
        run: |
          if [[ -n $(git status --short) ]]; then
            git add -A
            git commit -m "chore: auto-fix linting issues [skip ci]"
            git push origin HEAD
            echo "Auto-fixes committed and pushed."
          else
            echo "No linting fixes needed."
          fi

      # ── Validation pass ────────────────────────────────────────────────────────
      - name: Validate Markdown
        run: |
          markdownlint "**/*.md" \
            --config .github/linters/.markdownlint.json

      - name: Validate Prettier formatting (Markdown / YAML / JSON)
        run: |
          prettier --check "**/*.{md,yaml,yml,json}" \
            --ignore-path .gitignore

      - name: Validate EditorConfig
        run: editorconfig-checker

      - name: Validate Terraform formatting
        run: terraform fmt -recursive -check ./terraform

      - name: Validate pre-commit config
        run: pre-commit validate-config .pre-commit-config.yaml

      - name: Check for merge conflict markers
        run: |
          if git grep --line-number "[<][<][<][<][<][<][<] " 2>/dev/null | grep .; then
            echo "ERROR: Merge conflict markers found!" >&2
            exit 1
          fi
          echo "No merge conflict markers found."

      - name: Validate commit messages (commitlint)
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}"

      - name: Validate natural language (textlint)
        # Advisory only: textlint-rule-terminology with defaultTerms=false and
        # no custom terms performs no checks, but the step validates the config.
        run: |
          textlint \
            --config .github/linters/.textlintrc \
            "**/*.md" || true
