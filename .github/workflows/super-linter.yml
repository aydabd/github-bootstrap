---
# Lint code using native tools (no Docker overhead).
#
# Pull-request runs:
#   1. Validate: Run all linters; fail the PR if anything is still wrong.
#
# Push-to-main / workflow_dispatch runs: validate only (no commits).
name: Super-Linter

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to the same PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Tool installation ──────────────────────────────────────────────────────
      # Native tools install in ~20 s; no Docker image pull (~72 s) needed.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Node.js lint tools
        # Use --loglevel=error to suppress known transitive-dep deprecation warnings
        # (git-raw-commits from @commitlint/read, glob from textlint) that are
        # upstream issues outside our control.
        run: |
          npm install --global --loglevel=error \
            markdownlint-cli \
            prettier \
            @commitlint/cli \
            @commitlint/config-conventional \
            textlint \
            textlint-rule-terminology \
            editorconfig-checker

      - name: Install Python tools
        run: pip install --quiet pre-commit

      # ── Validation pass ────────────────────────────────────────────────────────
      - name: Validate Markdown
        run: |
          markdownlint "**/*.md" \
            --ignore CHANGELOG.md \
            --config .github/linters/.markdownlint.json

      - name: Validate Prettier formatting (YAML / JSON)
        run: |
          prettier --check "**/*.{yaml,yml,json}" \
            --ignore-path .gitignore

      - name: Validate EditorConfig
        run: editorconfig-checker

      - name: Validate Terraform formatting
        run: terraform fmt -recursive -check ./terraform

      - name: Validate pre-commit config
        run: pre-commit validate-config .pre-commit-config.yaml

      - name: Check for merge conflict markers
        run: |
          if git grep --line-number "[<][<][<][<][<][<][<] " 2>/dev/null | grep .; then
            echo "ERROR: Merge conflict markers found!" >&2
            exit 1
          fi
          echo "No merge conflict markers found."

      - name: Validate commit messages (commitlint)
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}"

      - name: Validate natural language (textlint)
        # Advisory only: textlint-rule-terminology with defaultTerms=false and
        # no custom terms performs no checks, but the step validates the config.
        run: |
          textlint \
            --config .github/linters/.textlintrc \
            "**/*.md" || true
