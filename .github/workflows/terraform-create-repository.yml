---
name: Terraform Create Repository

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "New repository name"
        required: true
        type: string
      repo_owner:
        description: "Repository owner (user/org)"
        required: false
        type: string
      repo_description:
        description: "Repository description"
        required: false
        default: "Repository following SOLID principles and best practices"
        type: string
      visibility:
        description: "Repository visibility"
        required: false
        default: "public"
        type: choice
        options:
          - public
          - private
          - internal
      cleanup_on_failure:
        description: "Destroy Terraform resources if workflow fails"
        required: false
        default: true
        type: boolean
      enable_branch_protection:
        description: "Enable branch protection rules"
        required: false
        default: true
        type: boolean
      team_name:
        description: "GitHub team for code owners (e.g., team-leads)"
        required: false
        default: "team-leads"
        type: string
      license_holder:
        description: "License copyright holder name"
        required: false
        type: string
      languages:
        description: "Programming languages (comma-separated: javascript,typescript,python or 'all' for monorepo)"
        required: false
        default: "language-agnostic-only"
        type: string
      release_tool:
        description: >-
          Release automation tool:
          'git-cliff' (tag-triggered, fast changelog, any language),
          'release-please' (PR-based, auto-bumps version files),
          'semantic-release' (push-to-main, fully automated, any language)
        required: false
        default: "git-cliff"
        type: choice
        options:
          - git-cliff
          - release-please
          - semantic-release
      gh_token:
        description: >-
          Personal Access Token with repo and admin:org scopes.
          WARNING: This input is NOT treated as a secret — its value may be
          visible in the run's inputs/metadata to anyone who can view the run.
          Prefer using the repository secret GH_PAT whenever possible.
          Only use this input when you do not have permission to set repository
          secrets and use a short-lived token with minimum required scopes.
        required: false
        type: string

jobs:
  terraform-create-repository:
    name: Terraform Create Repository
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.set-owner.outputs.owner }}
      repo_created: ${{ steps.check-repo.outputs.repo_created }}
    permissions:
      contents: write
      id-token: write
      actions: write

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.5"
          terraform_wrapper: false

      - name: Set repository owner
        id: set-owner
        run: |
          if [ -z "${{ github.event.inputs.repo_owner }}" ]; then
            echo "owner=${{ github.repository_owner }}" >> $GITHUB_OUTPUT
          else
            echo "owner=${{ github.event.inputs.repo_owner }}" >> $GITHUB_OUTPUT
          fi

      - name: Set license holder
        id: set-license
        run: |
          if [ -z "${{ github.event.inputs.license_holder }}" ]; then
            echo "holder=${{ github.repository_owner }}" >> $GITHUB_OUTPUT
          else
            echo "holder=${{ github.event.inputs.license_holder }}" >> $GITHUB_OUTPUT
          fi

      - name: Resolve GitHub token
        id: resolve-token
        uses: ./.github/actions/resolve-gh-token
        with:
          gh_token: ${{ github.event.inputs.gh_token }}
          gh_pat_secret: ${{ secrets.GH_PAT }}

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_VAR_github_token: ${{ steps.resolve-token.outputs.token }}
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_github_token: ${{ steps.resolve-token.outputs.token }}
          TF_VAR_repo_name: ${{ github.event.inputs.repo_name }}
          TF_VAR_repo_owner: ${{ steps.set-owner.outputs.owner }}
          TF_VAR_repo_description: ${{ github.event.inputs.repo_description }}
          TF_VAR_visibility: ${{ github.event.inputs.visibility }}
          TF_VAR_enable_branch_protection: ${{ github.event.inputs.enable_branch_protection }}
          TF_VAR_team_name: ${{ github.event.inputs.team_name }}
          TF_VAR_license_holder: ${{ steps.set-license.outputs.holder }}
          TF_VAR_languages: ${{ github.event.inputs.languages }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        id: terraform-apply
        working-directory: terraform
        continue-on-error: true
        env:
          TF_VAR_github_token: ${{ steps.resolve-token.outputs.token }}
          TF_VAR_repo_name: ${{ github.event.inputs.repo_name }}
          TF_VAR_repo_owner: ${{ steps.set-owner.outputs.owner }}
          TF_VAR_repo_description: ${{ github.event.inputs.repo_description }}
          TF_VAR_visibility: ${{ github.event.inputs.visibility }}
          TF_VAR_enable_branch_protection: ${{ github.event.inputs.enable_branch_protection }}
          TF_VAR_team_name: ${{ github.event.inputs.team_name }}
          TF_VAR_license_holder: ${{ steps.set-license.outputs.holder }}
          TF_VAR_languages: ${{ github.event.inputs.languages }}
        run: terraform apply -auto-approve tfplan

      - name: Check repository created
        id: check-repo
        if: always()
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          if gh repo view "${{ steps.set-owner.outputs.owner }}/${{ github.event.inputs.repo_name }}" &>/dev/null; then
            echo "repo_created=true" >> $GITHUB_OUTPUT
          else
            echo "repo_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail job if Terraform apply failed
        if: steps.terraform-apply.outcome == 'failure'
        run: exit 1

      - name: Wait for repository initialization
        run: sleep 5

      - name: Clone new repository
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ steps.set-owner.outputs.owner }}/${{ github.event.inputs.repo_name }}.git new-repo
          cd new-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Copy template files
        run: |
          cp -r templates/* new-repo/
          cp -r templates/.github new-repo/
          cp -r templates/.cursor new-repo/
          cp templates/.gitignore new-repo/
          cp templates/.gitattributes new-repo/
          cp templates/.commitlintrc.yml new-repo/
          cp templates/.release-please-manifest.json new-repo/
          cp templates/.coderabbit.yaml new-repo/
          cp templates/.prettierrc.yaml new-repo/
          cp templates/.prettierignore new-repo/

          # Copy release-tool specific dotfiles / directories
          cp templates/.releaserc.json new-repo/

          cp templates/.github/linters/.editorconfig new-repo/

      - name: Configure release tool
        run: |
          cd new-repo
          RELEASE_TOOL="${{ github.event.inputs.release_tool }}"

          # Files (use rm -f) separated by release tool
          RP_FILES="release-please-config.json .release-please-manifest.json .github/workflows/release-please.yml"
          GC_FILES="cliff.toml .github/workflows/git-cliff-release.yml"
          SR_FILES=".releaserc.json .github/workflows/semantic-release.yml"

          case "$RELEASE_TOOL" in
            "release-please")
              rm -f $GC_FILES $SR_FILES
              echo "Release tool: **release-please** — PR-based semantic versioning (language-aware, ~7k ⭐)" >> $GITHUB_STEP_SUMMARY
              ;;
            "semantic-release")
              rm -f $RP_FILES $GC_FILES
              echo "Release tool: **semantic-release** — push-to-main, fully automated versioning (any language, ~23k ⭐)" >> $GITHUB_STEP_SUMMARY
              ;;
            *)
              # Default: git-cliff
              rm -f $RP_FILES $SR_FILES
              echo "Release tool: **git-cliff** — tag-triggered changelog + GitHub Release (any language, ~9k ⭐)" >> $GITHUB_STEP_SUMMARY
              ;;
          esac

      - name: Update CODEOWNERS with team name
        run: |
          cd new-repo
          sed -i "s/team-leads/${{ github.event.inputs.team_name }}/g" .github/CODEOWNERS

      - name: Update LICENSE with current year and holder
        run: |
          cd new-repo
          CURRENT_YEAR=$(date +%Y)
          sed -i "s/\[year\]/$CURRENT_YEAR/g" LICENSE
          sed -i "s/\[fullname\]/${{ steps.set-license.outputs.holder }}/g" LICENSE

      - name: Update README with repository details
        run: |
          cd new-repo
          sed -i "s/{{REPOSITORY_OWNER}}/${{ steps.set-owner.outputs.owner }}/g" README.md
          sed -i "s/{{REPOSITORY_NAME}}/${{ github.event.inputs.repo_name }}/g" README.md

      - name: Configure language tooling
        run: |
          LANGUAGES="${{ github.event.inputs.languages }}"
          REPO_NAME="${{ github.event.inputs.repo_name }}"

          # Map languages input to template directory.
          # Use the first language when multiple are specified.
          # Supported: language-agnostic-only, python, golang, typescript, java
          FIRST_LANG=$(echo "$LANGUAGES" | cut -d',' -f1 | xargs)
          case "$FIRST_LANG" in
            "python")                 LANG_DIR="python" ;;
            "go"|"golang")            LANG_DIR="golang" ;;
            "typescript"|"javascript") LANG_DIR="typescript" ;;
            "java"|"kotlin")          LANG_DIR="java" ;;
            *)                        LANG_DIR="agnostic" ;;
          esac

          TEMPLATE_DIR="templates/languages/$LANG_DIR"
          REPO_DIR="new-repo"

          echo "Using language template: $LANG_DIR" >> $GITHUB_STEP_SUMMARY

          # Copy language-specific tooling files
          cp "$TEMPLATE_DIR/environment.yml" "$REPO_DIR/environment.yml"
          cp "$TEMPLATE_DIR/.pre-commit-config.yaml" "$REPO_DIR/.pre-commit-config.yaml"
          cp "$TEMPLATE_DIR/Makefile" "$REPO_DIR/Makefile"

          # Substitute repository name placeholder in all three files
          sed -i "s/{{REPOSITORY_NAME}}/$REPO_NAME/g" "$REPO_DIR/environment.yml"
          sed -i "s/{{REPOSITORY_NAME}}/$REPO_NAME/g" "$REPO_DIR/Makefile"
          sed -i "s/{{REPOSITORY_NAME}}/$REPO_NAME/g" "$REPO_DIR/.github/workflows/lint.yml"

      - name: Configure Release Please for selected languages
        if: github.event.inputs.release_tool == 'release-please'
        run: |
          cd new-repo
          LANGUAGES="${{ github.event.inputs.languages }}"

          # Map language to release-please release-type
          # See: https://github.com/googleapis/release-please#supported-release-types
          get_release_type() {
            local lang=$1
            case "$lang" in
              "javascript"|"typescript") echo "node" ;;
              "python")                  echo "python" ;;
              "go")                      echo "go" ;;
              "rust")                    echo "rust" ;;
              "java"|"kotlin")           echo "java" ;;
              "ruby")                    echo "ruby" ;;
              "php")                     echo "php" ;;
              "terraform")              echo "terraform-module" ;;
              *)                         echo "simple" ;;
            esac
          }

          RELEASE_TYPE="simple"

          if [ "$LANGUAGES" != "all" ] && [ "$LANGUAGES" != "language-agnostic-only" ]; then
            # Use the first language in the comma-separated list to determine release type
            FIRST_LANG=$(echo "$LANGUAGES" | cut -d',' -f1 | xargs)
            RELEASE_TYPE=$(get_release_type "$FIRST_LANG")
          fi

          # Update release-please-config.json with the correct release type
          jq --arg rt "$RELEASE_TYPE" '."release-type" = $rt' release-please-config.json > tmp.json && mv tmp.json release-please-config.json
          echo "Release Please configured with release-type: $RELEASE_TYPE" >> $GITHUB_STEP_SUMMARY

      - name: Configure CodeQL for selected languages
        env:
          CODEQL_INPUT_LANGUAGES: ${{ github.event.inputs.languages }}
        run: |
          cd new-repo
          python3 "$GITHUB_WORKSPACE/.github/scripts/configure-codeql.py"

      - name: Commit and push files
        id: push-files
        run: |
          cd new-repo
          git add .
          git commit -m "chore: initialize repository from bootstrap template"
          git push
          echo "✅ Template files pushed" >> $GITHUB_STEP_SUMMARY

      - name: Enable Dependabot security features
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          OWNER="${{ steps.set-owner.outputs.owner }}"
          REPO="${{ github.event.inputs.repo_name }}"

          # Enable Dependabot vulnerability alerts
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /repos/$OWNER/$REPO/vulnerability-alerts
          echo "✅ Vulnerability alerts enabled" >> $GITHUB_STEP_SUMMARY

          # Enable Dependabot automated security fixes
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /repos/$OWNER/$REPO/automated-security-fixes
          echo "✅ Dependabot security updates enabled" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        run: |
          echo "✅ Repository created successfully via Terraform!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** https://github.com/${{ steps.set-owner.outputs.owner }}/${{ github.event.inputs.repo_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Visibility:** ${{ github.event.inputs.visibility }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch Protection:** ${{ github.event.inputs.enable_branch_protection }}" >> $GITHUB_STEP_SUMMARY
          echo "**Languages:** ${{ github.event.inputs.languages }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release tool:** ${{ github.event.inputs.release_tool || 'git-cliff' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Created Resources (via Terraform)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub repository" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Repository settings (squash merge, auto-delete branches)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Vulnerability alerts enabled" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependabot security updates enabled" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Development environment" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Production environment" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Branch protection ruleset (2 required approvals, linear history, code-owner review)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Created Resources (via Template)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CODEOWNERS" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependabot configuration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ .editorconfig (4 spaces code, 2 spaces config)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ .gitignore, .gitattributes" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Documentation templates" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SECURITY.md (security policy)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CONTRIBUTING.md (contribution guide)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ LICENSE (MIT)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Lint workflow (micromamba + pre-commit)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ environment.yml (language: ${{ github.event.inputs.languages }})" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ .pre-commit-config.yaml (all language: system hooks)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Conventional commits (pre-commit)" >> $GITHUB_STEP_SUMMARY
          case "${{ github.event.inputs.release_tool }}" in
            "release-please")
              echo "- ✅ Release Please workflow (PR-based semantic versioning)" >> $GITHUB_STEP_SUMMARY
              ;;
            "semantic-release")
              echo "- ✅ semantic-release workflow (push-to-main, fully automated)" >> $GITHUB_STEP_SUMMARY
              echo "- ✅ .releaserc.json (semantic-release configuration)" >> $GITHUB_STEP_SUMMARY
              ;;
            *)
              echo "- ✅ git-cliff release workflow (tag-based changelog + GitHub Release)" >> $GITHUB_STEP_SUMMARY
              echo "- ✅ cliff.toml (changelog configuration)" >> $GITHUB_STEP_SUMMARY
              ;;
          esac
          echo "- ✅ Makefile (run 'make lint' locally)" >> $GITHUB_STEP_SUMMARY

  teardown:
    name: Delete Repository on Failure
    runs-on: ubuntu-latest
    needs: terraform-create-repository
    if: >-
      always() &&
      needs.terraform-create-repository.outputs.repo_created == 'true' &&
      needs.terraform-create-repository.result == 'failure' &&
      github.event.inputs.cleanup_on_failure == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v6

      - name: Resolve GitHub token
        id: resolve-token
        uses: ./.github/actions/resolve-gh-token
        with:
          gh_token: ${{ github.event.inputs.gh_token }}
          gh_pat_secret: ${{ secrets.GH_PAT }}

      - name: Delete repository on failure
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          OWNER="${{ needs.terraform-create-repository.outputs.owner }}"
          REPO="${{ github.event.inputs.repo_name }}"

          if gh repo view "$OWNER/$REPO" &>/dev/null; then
            echo "🗑️ Deleting repository $OWNER/$REPO due to failure..." >> $GITHUB_STEP_SUMMARY
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              /repos/$OWNER/$REPO
            echo "✅ Repository deleted successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Repository does not exist, nothing to clean up" >> $GITHUB_STEP_SUMMARY
          fi
