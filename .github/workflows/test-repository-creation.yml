name: Test Repository Creation

on:
  workflow_dispatch:
    inputs:
      test_repo_name:
        description: "Name for test repository (will be prefixed with test-)"
        required: false
        default: "bootstrap-test"
        type: string
      languages:
        description: "Languages to test (comma-separated or 'all' or 'language-agnostic-only')"
        required: false
        default: "language-agnostic-only"
        type: string
      target_workflow:
        description: "Creation workflow to test"
        required: false
        default: "create-repository.yml"
        type: choice
        options:
          - create-repository.yml
          - terraform-create-repository.yml
      target_ref:
        description: "Branch or tag ref for the target workflow run"
        required: false
        default: "main"
        type: string
      env_manager:
        description: "Environment manager to validate"
        required: false
        default: "micromamba"
        type: choice
        options:
          - micromamba
          - mise
          - system
      cleanup_after_test:
        description: "Automatically delete test repository after validation"
        required: false
        default: false
        type: boolean
      python_version:
        description: "Python runtime version used by target workflow"
        required: false
        default: "3.13"
        type: choice
        options:
          - "3.13"
          - "3.12"
      node_version:
        description: "Node.js major LTS version used by target workflow"
        required: false
        default: "24"
        type: choice
        options:
          - "24"
          - "22"
      go_version:
        description: "Go stable version used by target workflow"
        required: false
        default: "1.26"
        type: choice
        options:
          - "1.26"
          - "1.25"
      java_version:
        description: "Java LTS version used by target workflow"
        required: false
        default: "25"
        type: choice
        options:
          - "25"
          - "21"
      release_tool:
        description: "Release workflow mode used by target workflow"
        required: false
        default: "git-cliff"
        type: choice
        options:
          - git-cliff
          - release-please
          - semantic-release
      gh_token:
        description: >-
          Personal Access Token with repo and admin:org scopes.
          WARNING: This input is NOT treated as a secret — its value may be
          visible in the run's inputs/metadata to anyone who can view the run.
          Prefer using the repository secret GH_PAT whenever possible.
          Only use this input when you do not have permission to set repository
          secrets and use a short-lived token with minimum required scopes.
        required: false
        type: string

jobs:
  create-test-repo:
    name: Create Test Repository
    runs-on: ubuntu-latest
    outputs:
      test_repo_name: ${{ steps.generate-name.outputs.repo_name }}
      repo_created: ${{ steps.verify-repo.outputs.created }}
    permissions:
      contents: write
      id-token: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Generate unique test repository name
        id: generate-name
        run: |
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          REPO_NAME="test-${{ github.event.inputs.test_repo_name }}-${TIMESTAMP}"
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "Generated test repository name: ${REPO_NAME}"

      - name: Resolve GitHub token
        id: resolve-token
        uses: ./.github/actions/resolve-gh-token
        with:
          gh_token: ${{ github.event.inputs.gh_token }}
          gh_pat_secret: ${{ secrets.GH_PAT }}

      - name: Validate test inputs
        id: validate-inputs
        shell: bash
        env:
          ENV_MANAGER_INPUT: ${{ github.event.inputs.env_manager }}
          LANGUAGES_INPUT: ${{ github.event.inputs.languages }}
          TARGET_WORKFLOW_INPUT: ${{ github.event.inputs.target_workflow }}
          TARGET_REF_INPUT: ${{ github.event.inputs.target_ref }}
        run: |
          ENV_MANAGER="$ENV_MANAGER_INPUT"
          LANGUAGES="$LANGUAGES_INPUT"
          TARGET_WORKFLOW="$TARGET_WORKFLOW_INPUT"
          TARGET_REF="$TARGET_REF_INPUT"
          if ! [[ "$ENV_MANAGER" =~ ^(micromamba|mise|system)$ ]]; then
            echo "::error::Invalid env_manager '$ENV_MANAGER'. Allowed: micromamba, mise, system"
            exit 1
          fi
          if ! [[ "$TARGET_WORKFLOW" =~ ^(create-repository.yml|terraform-create-repository.yml)$ ]]; then
            echo "::error::Invalid target_workflow '$TARGET_WORKFLOW'."
            exit 1
          fi
          if [ -z "$TARGET_REF" ]; then
            echo "::error::target_ref must not be empty"
            exit 1
          fi
          if ! [[ "$TARGET_REF" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "$TARGET_REF" == *".."* ]] || [[ "$TARGET_REF" == /* ]] || [[ "$TARGET_REF" == */ ]]; then
            echo "::error::Invalid target_ref '$TARGET_REF'."
            exit 1
          fi
          echo "env_manager=$ENV_MANAGER" >> "$GITHUB_OUTPUT"
          echo "languages=$LANGUAGES" >> "$GITHUB_OUTPUT"
          echo "target_workflow=$TARGET_WORKFLOW" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"

      - name: Trigger repository creation workflow
        id: trigger-workflow
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          TARGET_WORKFLOW: ${{ steps.validate-inputs.outputs.target_workflow }}
          TARGET_REF: ${{ steps.validate-inputs.outputs.target_ref }}
          REPO_NAME: ${{ steps.generate-name.outputs.repo_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          LANGUAGES: ${{ steps.validate-inputs.outputs.languages }}
          ENV_MANAGER: ${{ steps.validate-inputs.outputs.env_manager }}
          PYTHON_VERSION: ${{ github.event.inputs.python_version }}
          NODE_VERSION: ${{ github.event.inputs.node_version }}
          GO_VERSION: ${{ github.event.inputs.go_version }}
          JAVA_VERSION: ${{ github.event.inputs.java_version }}
          RELEASE_TOOL: ${{ github.event.inputs.release_tool }}
        run: |
          gh workflow run "$TARGET_WORKFLOW" \
            --ref "$TARGET_REF" \
            --field repo_name="$REPO_NAME" \
            --field repo_description="Test repository for bootstrap validation - created $(date)" \
            --field visibility="public" \
            --field enable_branch_protection="false" \
            --field team_name="* @$REPO_OWNER" \
            --field license_holder="$REPO_OWNER" \
            --field languages="$LANGUAGES" \
            --field env_manager="$ENV_MANAGER" \
            --field python_version="$PYTHON_VERSION" \
            --field node_version="$NODE_VERSION" \
            --field go_version="$GO_VERSION" \
            --field java_version="$JAVA_VERSION" \
            --field release_tool="$RELEASE_TOOL" \
            --field cleanup_on_failure="true"

          echo "workflow_triggered=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Monitor workflow execution
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          WORKFLOW_FILE: ${{ steps.validate-inputs.outputs.target_workflow }}
          TARGET_REF: ${{ steps.validate-inputs.outputs.target_ref }}
          REPOSITORY: ${{ github.repository }}
        timeout-minutes: 10
        run: |
          echo "⏳ Monitoring ${WORKFLOW_FILE} on ref ${TARGET_REF}..."

          # Wait a moment for the workflow to be registered
          sleep 5

          # Poll for the workflow run
          for i in {1..60}; do
            # Get the latest workflow run for selected workflow
            RUN_STATUS=$(gh api \
              "/repos/${REPOSITORY}/actions/workflows/${WORKFLOW_FILE}/runs?per_page=1&event=workflow_dispatch&branch=${TARGET_REF}" \
              --jq '.workflow_runs[0] | {status: .status, conclusion: .conclusion, html_url: .html_url}')

            STATUS=$(echo "$RUN_STATUS" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_STATUS" | jq -r '.conclusion')
            WORKFLOW_URL=$(echo "$RUN_STATUS" | jq -r '.html_url')

            echo "Workflow status: $STATUS, conclusion: $CONCLUSION"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "✅ Repository creation workflow completed successfully"
                echo "Workflow: $WORKFLOW_URL"
                break
              else
                echo "❌ Repository creation workflow failed with conclusion: $CONCLUSION"
                echo "Workflow: $WORKFLOW_URL"
                exit 1
              fi
            else
              echo "⏳ Workflow still running... (check $i/60)"
              sleep 10
            fi

            if [ $i -eq 60 ]; then
              echo "❌ Workflow monitoring timed out"
              echo "Workflow: $WORKFLOW_URL"
              exit 1
            fi
          done

      - name: Verify repository was created
        id: verify-repo
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"

          if gh repo view ${{ github.repository_owner }}/${REPO_NAME} &>/dev/null; then
            echo "✅ Repository verified: https://github.com/${{ github.repository_owner }}/${REPO_NAME}"
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Repository not found after workflow completion"
            echo "created=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Validate repository structure
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          ENV_MANAGER="${{ steps.validate-inputs.outputs.env_manager }}"
          LANGUAGES="${{ steps.validate-inputs.outputs.languages }}"

          echo "🔍 Validating repository structure..."

          # Check essential files exist
          REQUIRED_FILES=(
            ".github/workflows/lint.yml"
            ".github/CODEOWNERS"
            ".github/dependabot.yml"
            ".pre-commit-config.yaml"
            ".editorconfig"
            ".gitignore"
            ".gitattributes"
            "README.md"
            "LICENSE"
            "Makefile"
            "AGENT.md"
            "CLAUDE.md"
            ".github/copilot-instructions.md"
            ".github/instructions/project.instructions.md"
            ".github/instructions/prompt-quality.instructions.md"
            ".cursor/rules/project.mdc"
            ".windsurfrules"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${file}" >/dev/null 2>&1; then
              echo "✅ Found: ${file}"
            else
              echo "❌ Missing: ${file}"
              exit 1
            fi
          done

          FIRST_LANG=$(echo "$LANGUAGES" | cut -d',' -f1 | xargs)
          case "$FIRST_LANG" in
            "python")                 LANG_DIR="python" ;;
            "go"|"golang")            LANG_DIR="golang" ;;
            "typescript"|"javascript") LANG_DIR="typescript" ;;
            "java"|"kotlin")          LANG_DIR="java" ;;
            *)                         LANG_DIR="agnostic" ;;
          esac

          PROVIDER_DIR="templates/languages/$LANG_DIR/providers/$ENV_MANAGER"
          if [ ! -d "$PROVIDER_DIR" ]; then
            echo "❌ Missing provider template directory: $PROVIDER_DIR"
            exit 1
          fi

          if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/Makefile" >/dev/null 2>&1; then
            echo "✅ Found provider Makefile"
          else
            echo "❌ Missing provider Makefile"
            exit 1
          fi

          for tooling_file in environment.yml mise.toml; do
            if [ -f "$PROVIDER_DIR/$tooling_file" ]; then
              if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${tooling_file}" >/dev/null 2>&1; then
                echo "✅ Found provider file for ${ENV_MANAGER}: ${tooling_file}"
              else
                echo "❌ Missing provider file for ${ENV_MANAGER}: ${tooling_file}"
                exit 1
              fi
            fi
          done

          normalize_lang() {
            case "$(echo "$1" | xargs | tr '[:upper:]' '[:lower:]')" in
              go|golang) echo "golang" ;;
              python) echo "python" ;;
              typescript|javascript|node|nodejs) echo "typescript" ;;
              java|kotlin) echo "java" ;;
              all) echo "all" ;;
              *) echo "agnostic" ;;
            esac
          }

          SELECTED_LANGS=()
          IFS=',' read -ra LANG_INPUTS <<< "$LANGUAGES"
          for raw_lang in "${LANG_INPUTS[@]}"; do
            normalized=$(normalize_lang "$raw_lang")
            if [ "$normalized" = "all" ]; then
              for every in golang python typescript java; do
                SELECTED_LANGS+=("$every")
              done
            elif [ "$normalized" != "agnostic" ]; then
              SELECTED_LANGS+=("$normalized")
            fi
          done

          # De-duplicate while preserving order.
          UNIQUE_LANGS=()
          for lang in "${SELECTED_LANGS[@]}"; do
            if [[ ! " ${UNIQUE_LANGS[*]} " =~ " ${lang} " ]]; then
              UNIQUE_LANGS+=("$lang")
            fi
          done

          for lang in "${UNIQUE_LANGS[@]}"; do
            lang_config_path=".pre-commit/languages/${lang}.yaml"
            if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${lang_config_path}" >/dev/null 2>&1; then
              echo "✅ Found language pre-commit config: ${lang_config_path}"
            else
              echo "❌ Missing language pre-commit config: ${lang_config_path}"
              exit 1
            fi
          done

          FORBIDDEN_TEMPLATE_PATHS=(
            "languages"
            "providers"
            ".github/workflows/providers"
          )

          for path in "${FORBIDDEN_TEMPLATE_PATHS[@]}"; do
            if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${path}" >/dev/null 2>&1; then
              echo "❌ Unexpected template-only path found: ${path}"
              exit 1
            else
              echo "✅ Absent template-only path: ${path}"
            fi
          done

          echo "🎉 All required files are present!"

      - name: Validate agent kit structure
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"
          ERRORS=0

          echo "Validating agent kit structure..."

          # Check .github/agents/ has the expected agent files
          GH_AGENTS=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.github/agents" --jq '.[].name' 2>/dev/null | wc -l)
          if [ "$GH_AGENTS" -ge 29 ]; then
            echo "✅ .github/agents/: ${GH_AGENTS} agent files"
          else
            echo "❌ .github/agents/: expected >= 29, found ${GH_AGENTS}"
            ERRORS=$((ERRORS + 1))
          fi

          # Check .claude/agents/ has the expected agent files
          CLAUDE_AGENTS=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.claude/agents" --jq '.[].name' 2>/dev/null | wc -l)
          if [ "$CLAUDE_AGENTS" -ge 29 ]; then
            echo "✅ .claude/agents/: ${CLAUDE_AGENTS} agent files"
          else
            echo "❌ .claude/agents/: expected >= 29, found ${CLAUDE_AGENTS}"
            ERRORS=$((ERRORS + 1))
          fi

          # Check .github/skills/ has the expected skill directories
          GH_SKILLS=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.github/skills" --jq '.[].name' 2>/dev/null | wc -l)
          if [ "$GH_SKILLS" -ge 32 ]; then
            echo "✅ .github/skills/: ${GH_SKILLS} skill directories"
          else
            echo "❌ .github/skills/: expected >= 32, found ${GH_SKILLS}"
            ERRORS=$((ERRORS + 1))
          fi

          # Check .claude/skills/ has the expected skill directories
          CLAUDE_SKILLS=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.claude/skills" --jq '.[].name' 2>/dev/null | wc -l)
          if [ "$CLAUDE_SKILLS" -ge 32 ]; then
            echo "✅ .claude/skills/: ${CLAUDE_SKILLS} skill directories"
          else
            echo "❌ .claude/skills/: expected >= 32, found ${CLAUDE_SKILLS}"
            ERRORS=$((ERRORS + 1))
          fi

          # Spot-check: verify a skill file has real content (not empty symlink artifact)
          SKILL_CONTENT=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.claude/skills/security-review/SKILL.md" --jq '.size' 2>/dev/null)
          if [ "$SKILL_CONTENT" -gt 100 ] 2>/dev/null; then
            echo "✅ .claude/skills/security-review/SKILL.md has content (${SKILL_CONTENT} bytes)"
          else
            echo "❌ .claude/skills/security-review/SKILL.md is empty or missing (symlink may not have been preserved)"
            ERRORS=$((ERRORS + 1))
          fi

          # Spot-check: verify an agent file has real content
          AGENT_CONTENT=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.github/agents/security-reviewer.agent.md" --jq '.size' 2>/dev/null)
          if [ "$AGENT_CONTENT" -gt 100 ] 2>/dev/null; then
            echo "✅ .github/agents/security-reviewer.agent.md has content (${AGENT_CONTENT} bytes)"
          else
            echo "❌ .github/agents/security-reviewer.agent.md is empty or missing"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Agent kit validation failed with ${ERRORS} error(s)"
            exit 1
          fi
          echo "Agent kit structure verified"

      - name: Verify no stale Super-Linter artifacts
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"

          echo "Checking for stale Super-Linter artifacts..."

          # These files must NOT exist
          FORBIDDEN_FILES=(
            ".super-linter.env"
            ".github/workflows/super-linter.yml"
          )

          for file in "${FORBIDDEN_FILES[@]}"; do
            if gh api "/repos/${OWNER}/${REPO_NAME}/contents/${file}" >/dev/null 2>&1; then
              echo "❌ Stale artifact found: ${file}"
              exit 1
            else
              echo "✅ Absent (correct): ${file}"
            fi
          done

          echo "No stale Super-Linter artifacts found"

      - name: Check pre-commit configuration
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"

          echo "🔍 Checking pre-commit configuration for languages: ${{ github.event.inputs.languages }}"

          # Get the .pre-commit-config.yaml content
          PRECOMMIT_CONFIG=$(gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/.pre-commit-config.yaml" --jq '.content' | base64 -d)

          echo "Pre-commit configuration:"
          echo "$PRECOMMIT_CONFIG"

          # Verify essential hooks are present
          if echo "$PRECOMMIT_CONFIG" | grep -q "trailing-whitespace"; then
            echo "✅ Core pre-commit hooks configured"
          else
            echo "❌ Core pre-commit hooks missing"
            exit 1
          fi

          if echo "$PRECOMMIT_CONFIG" | grep -q "conventional-pre-commit"; then
            echo "✅ Conventional commits hook configured"
          else
            echo "❌ Conventional commits hook missing"
            exit 1
          fi

      - name: Trigger lint workflow
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${OWNER}/${REPO_NAME}/actions/workflows/lint.yml/dispatches" \
            -f ref="main"

          echo "✅ Lint workflow dispatched"
          echo "Check result: https://github.com/${OWNER}/${REPO_NAME}/actions"

      - name: Write job summary
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"
          REPO_URL="https://github.com/${OWNER}/${REPO_NAME}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Test Repository Created

          | Item | Status |
          |------|--------|
          | Repository | [${OWNER}/${REPO_NAME}](${REPO_URL}) |
          | Structure validation | ✅ Passed |
          | Agent kit (agents + skills) | ✅ Passed |
          | No stale Super-Linter artifacts | ✅ Passed |
          | Pre-commit config | ✅ Passed |
          | Lint workflow | Dispatched — [check result](${REPO_URL}/actions) |

          ### Next steps

          1. Verify the lint workflow passes in the test repo
          2. Open a PR to test the PR-triggered lint path
          3. Delete when done: \`gh repo delete ${OWNER}/${REPO_NAME} --yes\`
          EOF

  cleanup-test-repo:
    name: Cleanup Test Repository
    needs: create-test-repo
    runs-on: ubuntu-latest
    if: >-
      ${{ always() &&
      needs.create-test-repo.outputs.repo_created == 'true' &&
      (github.event.inputs.cleanup_after_test == 'true' ||
      needs.create-test-repo.result == 'failure') }}
    permissions:
      contents: write

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v7

      - name: Resolve GitHub token
        id: resolve-token
        uses: ./.github/actions/resolve-gh-token
        with:
          gh_token: ${{ github.event.inputs.gh_token }}
          gh_pat_secret: ${{ secrets.GH_PAT }}

      - name: Delete test repository
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ needs.create-test-repo.outputs.test_repo_name }}"
          OWNER="${{ github.repository_owner }}"

          echo "Cleaning up test repository: ${OWNER}/${REPO_NAME}"

          if gh repo view "${OWNER}/${REPO_NAME}" &>/dev/null; then
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              /repos/${OWNER}/${REPO_NAME}

            echo "✅ Repository deleted successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Repository does not exist or was already deleted" >> $GITHUB_STEP_SUMMARY
          fi
