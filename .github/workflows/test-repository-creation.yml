---
name: Test Repository Creation

on:
  workflow_dispatch:
    inputs:
      test_repo_name:
        description: "Name for test repository (will be prefixed with test-)"
        required: false
        default: "bootstrap-test"
        type: string
      languages:
        description: "Languages to test (comma-separated or 'all' or 'language-agnostic-only')"
        required: false
        default: "language-agnostic-only"
        type: string
      cleanup_after_test:
        description: "Automatically delete test repository after testing"
        required: false
        default: true
        type: boolean
      wait_time_minutes:
        description: "Minutes to wait before cleanup (to inspect results)"
        required: false
        default: "5"
        type: string
      gh_token:
        description: >-
          Personal Access Token with repo and admin:org scopes.
          WARNING: This input is NOT treated as a secret — its value may be
          visible in the run's inputs/metadata to anyone who can view the run.
          Prefer using the repository secret GH_PAT whenever possible.
          Only use this input when you do not have permission to set repository
          secrets and use a short-lived token with minimum required scopes.
        required: false
        type: string

jobs:
  create-test-repo:
    name: Create Test Repository
    runs-on: ubuntu-latest
    outputs:
      test_repo_name: ${{ steps.generate-name.outputs.repo_name }}
      repo_created: ${{ steps.verify-repo.outputs.created }}
    permissions:
      contents: write
      id-token: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate unique test repository name
        id: generate-name
        run: |
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          REPO_NAME="test-${{ github.event.inputs.test_repo_name }}-${TIMESTAMP}"
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "Generated test repository name: ${REPO_NAME}"

      - name: Resolve GitHub token
        id: resolve-token
        uses: ./.github/actions/resolve-gh-token
        with:
          gh_token: ${{ github.event.inputs.gh_token }}
          gh_pat_secret: ${{ secrets.GH_PAT }}

      - name: Trigger repository creation workflow
        id: trigger-workflow
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          gh workflow run create-repository.yml \
            --field repo_name="${{ steps.generate-name.outputs.repo_name }}" \
            --field repo_description="Test repository for bootstrap validation - created $(date)" \
            --field visibility="public" \
            --field enable_branch_protection="false" \
            --field team_name="* @${{ github.repository_owner }}" \
            --field license_holder="${{ github.repository_owner }}" \
            --field languages="${{ github.event.inputs.languages }}" \
            --field cleanup_on_failure="true"

          echo "workflow_triggered=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Monitor workflow execution
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        timeout-minutes: 10
        run: |
          echo "⏳ Monitoring create-repository workflow..."

          # Wait a moment for the workflow to be registered
          sleep 5

          # Poll for the workflow run
          for i in {1..60}; do
            # Get the latest workflow run for create-repository.yml
            RUN_STATUS=$(gh api \
              "/repos/${{ github.repository }}/actions/workflows/create-repository.yml/runs?per_page=1" \
              --jq '.workflow_runs[0] | {status: .status, conclusion: .conclusion, html_url: .html_url}')

            STATUS=$(echo "$RUN_STATUS" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_STATUS" | jq -r '.conclusion')
            WORKFLOW_URL=$(echo "$RUN_STATUS" | jq -r '.html_url')

            echo "Workflow status: $STATUS, conclusion: $CONCLUSION"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "✅ Repository creation workflow completed successfully"
                echo "Workflow: $WORKFLOW_URL"
                break
              else
                echo "❌ Repository creation workflow failed with conclusion: $CONCLUSION"
                echo "Workflow: $WORKFLOW_URL"
                exit 1
              fi
            else
              echo "⏳ Workflow still running... (check $i/60)"
              sleep 10
            fi

            if [ $i -eq 60 ]; then
              echo "❌ Workflow monitoring timed out"
              echo "Workflow: $WORKFLOW_URL"
              exit 1
            fi
          done

      - name: Verify repository was created
        id: verify-repo
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"

          if gh repo view ${{ github.repository_owner }}/${REPO_NAME} &>/dev/null; then
            echo "✅ Repository verified: https://github.com/${{ github.repository_owner }}/${REPO_NAME}"
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Repository not found after workflow completion"
            echo "created=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Validate repository structure
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"

          echo "🔍 Validating repository structure..."

          # Check essential files exist
          REQUIRED_FILES=(
            ".github/workflows/lint.yml"
            ".github/CODEOWNERS"
            ".github/dependabot.yml"
            ".pre-commit-config.yaml"
            "environment.yml"
            ".editorconfig"
            ".gitignore"
            ".gitattributes"
            "README.md"
            "LICENSE"
            "Makefile"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${file}" >/dev/null 2>&1; then
              echo "✅ Found: ${file}"
            else
              echo "❌ Missing: ${file}"
              exit 1
            fi
          done

          echo "🎉 All required files are present!"

      - name: Check pre-commit configuration
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"

          echo "🔍 Checking pre-commit configuration for languages: ${{ github.event.inputs.languages }}"

          # Get the .pre-commit-config.yaml content
          PRECOMMIT_CONFIG=$(gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/.pre-commit-config.yaml" --jq '.content' | base64 -d)

          echo "Pre-commit configuration:"
          echo "$PRECOMMIT_CONFIG"

          # Verify essential hooks are present
          if echo "$PRECOMMIT_CONFIG" | grep -q "trailing-whitespace"; then
            echo "✅ Core pre-commit hooks configured"
          else
            echo "❌ Core pre-commit hooks missing"
            exit 1
          fi

          if echo "$PRECOMMIT_CONFIG" | grep -q "conventional-pre-commit"; then
            echo "✅ Conventional commits hook configured"
          else
            echo "❌ Conventional commits hook missing"
            exit 1
          fi

      - name: Trigger lint workflow test
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"

          echo "🧪 Triggering lint workflow in test repository..."

          # Trigger the lint workflow in the test repo
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository_owner }}/${REPO_NAME}/actions/workflows/lint.yml/dispatches" \
            -f ref="main"

          echo "✅ Lint workflow triggered. Check: https://github.com/${{ github.repository_owner }}/${REPO_NAME}/actions"

  cleanup-test-repo:
    name: Cleanup Test Repository
    needs: create-test-repo
    runs-on: ubuntu-latest
    # Only run if repo was actually created AND (user wants cleanup OR the creation job failed)
    if: >-
      ${{ always() &&
      needs.create-test-repo.outputs.repo_created == 'true' &&
      (github.event.inputs.cleanup_after_test == 'true' ||
      needs.create-test-repo.result == 'failure') }}
    permissions:
      contents: write

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v6

      - name: Resolve GitHub token
        id: resolve-token
        uses: ./.github/actions/resolve-gh-token
        with:
          gh_token: ${{ github.event.inputs.gh_token }}
          gh_pat_secret: ${{ secrets.GH_PAT }}

      - name: Wait before cleanup
        # Only wait if the creation job succeeded - skip wait on failures
        if: ${{ needs.create-test-repo.result == 'success' }}
        run: |
          WAIT_MINUTES="${{ github.event.inputs.wait_time_minutes }}"
          echo "⏳ Waiting ${WAIT_MINUTES} minutes before cleanup to allow inspection..."
          sleep $((WAIT_MINUTES * 60))

      - name: Delete test repository
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ needs.create-test-repo.outputs.test_repo_name }}"
          OWNER="${{ github.repository_owner }}"

          echo "🗑️ Cleaning up test repository: ${OWNER}/${REPO_NAME}"

          # Check if repository exists before attempting deletion
          if gh repo view "${OWNER}/${REPO_NAME}" &>/dev/null; then
            # Delete the repository directly
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              /repos/${OWNER}/${REPO_NAME}

            echo "✅ Repository deleted successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Repository does not exist or was already deleted" >> $GITHUB_STEP_SUMMARY
          fi
