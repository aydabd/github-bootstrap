name: Test Repository Creation

on:
  workflow_dispatch:
    inputs:
      test_repo_name:
        description: "Name for test repository (will be prefixed with test-)"
        required: false
        default: "bootstrap-test"
        type: string
      preset:
        description: "One-click test scenario preset"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - api-default
          - terraform-default
          - api-no-repo-settings
          - terraform-no-repo-settings
          - api-all-languages
          - terraform-all-languages
      languages:
        description: "Languages to test (comma-separated or 'all' or 'language-agnostic-only')"
        required: false
        default: "language-agnostic-only"
        type: string
      visibility:
        description: "Repository visibility to pass to target workflow"
        required: false
        default: "public"
        type: choice
        options:
          - public
          - private
          - internal
      target_workflow:
        description: "Creation workflow to test"
        required: false
        default: "create-repository.yml"
        type: choice
        options:
          - create-repository.yml
          - terraform-create-repository.yml
      target_ref:
        description: "Branch or tag ref for the target workflow run"
        required: false
        default: "main"
        type: string
      env_manager:
        description: "Environment manager to validate"
        required: false
        default: "micromamba"
        type: choice
        options:
          - micromamba
          - mise
          - system
      cleanup_after_test:
        description: "Automatically delete test repository after validation"
        required: false
        default: false
        type: boolean
      python_version:
        description: "Python runtime version used by target workflow"
        required: false
        default: "3.13"
        type: choice
        options:
          - "3.13"
          - "3.12"
      node_version:
        description: "Node.js major LTS version used by target workflow"
        required: false
        default: "24"
        type: choice
        options:
          - "24"
          - "22"
      go_version:
        description: "Go stable version used by target workflow"
        required: false
        default: "1.26"
        type: choice
        options:
          - "1.26"
          - "1.25"
      java_version:
        description: "Java LTS version used by target workflow"
        required: false
        default: "25"
        type: choice
        options:
          - "25"
          - "21"
      release_tool:
        description: "Release workflow mode used by target workflow"
        required: false
        default: "git-cliff"
        type: choice
        options:
          - git-cliff
          - release-please
          - semantic-release
      enable_repo_settings:
        description: "Enable repo settings/dependabot/environments in target workflow"
        required: false
        default: true
        type: boolean
      enable_codeowners:
        description: "Enable CODEOWNERS generation in target workflow"
        required: false
        default: true
        type: boolean
      workflows:
        description: "Workflows to include: all, none, or comma-separated names"
        required: false
        default: "all"
        type: string
      gh_token:
        description: >-
          Personal Access Token with repo and admin:org scopes.
          WARNING: This input is NOT treated as a secret — its value may be
          visible in the run's inputs/metadata to anyone who can view the run.
          Prefer using the repository secret GH_PAT whenever possible.
          Only use this input when you do not have permission to set repository
          secrets and use a short-lived token with minimum required scopes.
        required: false
        type: string

jobs:
  create-test-repo:
    name: Create Test Repository
    runs-on: ubuntu-latest
    outputs:
      test_repo_name: ${{ steps.generate-name.outputs.repo_name }}
      repo_created: ${{ steps.verify-repo.outputs.created }}
    permissions:
      contents: write
      id-token: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.mod

      - name: Generate unique test repository name
        id: generate-name
        run: |
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          REPO_NAME="test-${{ github.event.inputs.test_repo_name }}-${TIMESTAMP}"
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "Generated test repository name: ${REPO_NAME}"

      - name: Resolve GitHub token
        id: resolve-token
        uses: ./.github/actions/resolve-gh-token
        with:
          gh_token: ${{ github.event.inputs.gh_token }}
          gh_pat_secret: ${{ secrets.GH_PAT }}

      - name: Validate test inputs
        id: validate-inputs
        shell: bash
        env:
          ENV_MANAGER_INPUT: ${{ github.event.inputs.env_manager }}
          LANGUAGES_INPUT: ${{ github.event.inputs.languages }}
          TARGET_WORKFLOW_INPUT: ${{ github.event.inputs.target_workflow }}
          TARGET_REF_INPUT: ${{ github.event.inputs.target_ref }}
          PRESET_INPUT: ${{ github.event.inputs.preset }}
          VISIBILITY_INPUT: ${{ github.event.inputs.visibility }}
          PYTHON_VERSION_INPUT: ${{ github.event.inputs.python_version }}
          NODE_VERSION_INPUT: ${{ github.event.inputs.node_version }}
          GO_VERSION_INPUT: ${{ github.event.inputs.go_version }}
          JAVA_VERSION_INPUT: ${{ github.event.inputs.java_version }}
          RELEASE_TOOL_INPUT: ${{ github.event.inputs.release_tool }}
          ENABLE_REPO_SETTINGS_INPUT: ${{ github.event.inputs.enable_repo_settings }}
          ENABLE_CODEOWNERS_INPUT: ${{ github.event.inputs.enable_codeowners }}
          WORKFLOWS_INPUT: ${{ github.event.inputs.workflows }}
        run: |
          ENV_MANAGER="$ENV_MANAGER_INPUT"
          LANGUAGES="$LANGUAGES_INPUT"
          TARGET_WORKFLOW="$TARGET_WORKFLOW_INPUT"
          TARGET_REF="$TARGET_REF_INPUT"
          PRESET="$PRESET_INPUT"
          VISIBILITY="$VISIBILITY_INPUT"
          PYTHON_VERSION="$PYTHON_VERSION_INPUT"
          NODE_VERSION="$NODE_VERSION_INPUT"
          GO_VERSION="$GO_VERSION_INPUT"
          JAVA_VERSION="$JAVA_VERSION_INPUT"
          RELEASE_TOOL="$RELEASE_TOOL_INPUT"
          ENABLE_REPO_SETTINGS="$ENABLE_REPO_SETTINGS_INPUT"
          ENABLE_CODEOWNERS="$ENABLE_CODEOWNERS_INPUT"
          WORKFLOWS="$WORKFLOWS_INPUT"

          case "$PRESET" in
            "none") ;;
            "api-default")
              TARGET_WORKFLOW="create-repository.yml"
              LANGUAGES="language-agnostic-only"
              ENV_MANAGER="micromamba"
              VISIBILITY="public"
              ENABLE_REPO_SETTINGS="true"
              ENABLE_CODEOWNERS="true"
              WORKFLOWS="all"
              ;;
            "terraform-default")
              TARGET_WORKFLOW="terraform-create-repository.yml"
              LANGUAGES="language-agnostic-only"
              ENV_MANAGER="micromamba"
              VISIBILITY="public"
              ENABLE_REPO_SETTINGS="true"
              ENABLE_CODEOWNERS="true"
              WORKFLOWS="all"
              ;;
            "api-no-repo-settings")
              TARGET_WORKFLOW="create-repository.yml"
              ENABLE_REPO_SETTINGS="false"
              ;;
            "terraform-no-repo-settings")
              TARGET_WORKFLOW="terraform-create-repository.yml"
              ENABLE_REPO_SETTINGS="false"
              ;;
            "api-all-languages")
              TARGET_WORKFLOW="create-repository.yml"
              LANGUAGES="all"
              ;;
            "terraform-all-languages")
              TARGET_WORKFLOW="terraform-create-repository.yml"
              LANGUAGES="all"
              ;;
            *)
              echo "::error::Invalid preset '$PRESET'"
              exit 1
              ;;
          esac
          if ! [[ "$ENV_MANAGER" =~ ^(micromamba|mise|system)$ ]]; then
            echo "::error::Invalid env_manager '$ENV_MANAGER'. Allowed: micromamba, mise, system"
            exit 1
          fi
          if ! [[ "$TARGET_WORKFLOW" =~ ^(create-repository.yml|terraform-create-repository.yml)$ ]]; then
            echo "::error::Invalid target_workflow '$TARGET_WORKFLOW'."
            exit 1
          fi
          if [ -z "$TARGET_REF" ]; then
            echo "::error::target_ref must not be empty"
            exit 1
          fi
          if ! [[ "$VISIBILITY" =~ ^(public|private|internal)$ ]]; then
            echo "::error::Invalid visibility '$VISIBILITY'. Allowed: public, private, internal"
            exit 1
          fi
          if ! [[ "$ENABLE_REPO_SETTINGS" =~ ^(true|false)$ ]]; then
            echo "::error::Invalid enable_repo_settings '$ENABLE_REPO_SETTINGS'. Allowed: true, false"
            exit 1
          fi
          if ! [[ "$ENABLE_CODEOWNERS" =~ ^(true|false)$ ]]; then
            echo "::error::Invalid enable_codeowners '$ENABLE_CODEOWNERS'. Allowed: true, false"
            exit 1
          fi
          if ! [[ "$RELEASE_TOOL" =~ ^(git-cliff|release-please|semantic-release)$ ]]; then
            echo "::error::Invalid release_tool '$RELEASE_TOOL'. Allowed: git-cliff, release-please, semantic-release"
            exit 1
          fi
          WORKFLOWS="${WORKFLOWS//[[:space:]]/}"
          if [ -z "$WORKFLOWS" ]; then
            WORKFLOWS="all"
          fi
          if ! [[ "$WORKFLOWS" =~ ^(all|none)$ ]] && ! [[ "$WORKFLOWS" =~ ^(lint|codeql|ai-code-review|release)(,(lint|codeql|ai-code-review|release))*$ ]]; then
            echo "::error::Invalid workflows '$WORKFLOWS'. Allowed: all, none, or comma-separated of lint,codeql,ai-code-review,release"
            exit 1
          fi
          if ! [[ "$TARGET_REF" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "$TARGET_REF" == *".."* ]] || [[ "$TARGET_REF" == /* ]] || [[ "$TARGET_REF" == */ ]]; then
            echo "::error::Invalid target_ref '$TARGET_REF'."
            exit 1
          fi

          ERR_FILE=$(mktemp)
          REPO_ROOT="${GITHUB_WORKSPACE:-$(git rev-parse --show-toplevel 2>/dev/null || pwd)}"
          BOOTSTRAP_INPUTS_PATH="$REPO_ROOT/tools/cmd/bootstrap-inputs"
          if ! NORMALIZED_JSON=$(go run "$BOOTSTRAP_INPUTS_PATH" \
            --mode validate \
            --languages "$LANGUAGES" \
            --python-version "$PYTHON_VERSION" \
            --node-version "$NODE_VERSION" \
            --go-version "$GO_VERSION" \
            --java-version "$JAVA_VERSION" 2>"$ERR_FILE"); then
            if [ -s "$ERR_FILE" ]; then
              LAST_LINE=$(tail -n 1 "$ERR_FILE")
              ERROR_MESSAGE=$(printf '%s' "$LAST_LINE" | jq -r '.message // empty' 2>/dev/null || true)
              if [ -n "$ERROR_MESSAGE" ]; then
                echo "::error::$ERROR_MESSAGE"
              else
                echo "::error::test input validation failed"
                echo "::error::Raw bootstrap-inputs output follows"
                while IFS= read -r line; do
                  echo "::error::$line"
                done < "$ERR_FILE"
              fi
            else
              echo "::error::test input validation failed"
            fi
            rm -f "$ERR_FILE"
            exit 1
          fi
          rm -f "$ERR_FILE"

          NORMALIZED_LANGUAGES=$(echo "$NORMALIZED_JSON" | jq -r '.languages | join(",")')
          ROOT_LANGUAGE=$(echo "$NORMALIZED_JSON" | jq -r '.root_language')
          echo "env_manager=$ENV_MANAGER" >> "$GITHUB_OUTPUT"
          echo "languages=$LANGUAGES" >> "$GITHUB_OUTPUT"
          echo "normalized_languages=$NORMALIZED_LANGUAGES" >> "$GITHUB_OUTPUT"
          echo "root_language=$ROOT_LANGUAGE" >> "$GITHUB_OUTPUT"
          echo "target_workflow=$TARGET_WORKFLOW" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"
          echo "preset=$PRESET" >> "$GITHUB_OUTPUT"
          echo "visibility=$VISIBILITY" >> "$GITHUB_OUTPUT"
          echo "release_tool=$RELEASE_TOOL" >> "$GITHUB_OUTPUT"
          echo "enable_repo_settings=$ENABLE_REPO_SETTINGS" >> "$GITHUB_OUTPUT"
          echo "enable_codeowners=$ENABLE_CODEOWNERS" >> "$GITHUB_OUTPUT"
          echo "workflows=$WORKFLOWS" >> "$GITHUB_OUTPUT"

      - name: Trigger repository creation workflow
        id: trigger-workflow
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          TARGET_WORKFLOW: ${{ steps.validate-inputs.outputs.target_workflow }}
          TARGET_REF: ${{ steps.validate-inputs.outputs.target_ref }}
          REPO_NAME: ${{ steps.generate-name.outputs.repo_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          LANGUAGES: ${{ steps.validate-inputs.outputs.languages }}
          ENV_MANAGER: ${{ steps.validate-inputs.outputs.env_manager }}
          VISIBILITY: ${{ steps.validate-inputs.outputs.visibility }}
          PYTHON_VERSION: ${{ github.event.inputs.python_version }}
          NODE_VERSION: ${{ github.event.inputs.node_version }}
          GO_VERSION: ${{ github.event.inputs.go_version }}
          JAVA_VERSION: ${{ github.event.inputs.java_version }}
          RELEASE_TOOL: ${{ steps.validate-inputs.outputs.release_tool }}
          ENABLE_REPO_SETTINGS: ${{ steps.validate-inputs.outputs.enable_repo_settings }}
          ENABLE_CODEOWNERS: ${{ steps.validate-inputs.outputs.enable_codeowners }}
          WORKFLOWS: ${{ steps.validate-inputs.outputs.workflows }}
        run: |
          TRIGGERED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          gh workflow run "$TARGET_WORKFLOW" \
            --ref "$TARGET_REF" \
            --field repo_name="$REPO_NAME" \
            --field repo_description="Test repository for bootstrap validation - created $(date)" \
            --field visibility="$VISIBILITY" \
            --field team_name="* @$REPO_OWNER" \
            --field license_holder="$REPO_OWNER" \
            --field languages="$LANGUAGES" \
            --field env_manager="$ENV_MANAGER" \
            --field python_version="$PYTHON_VERSION" \
            --field node_version="$NODE_VERSION" \
            --field go_version="$GO_VERSION" \
            --field java_version="$JAVA_VERSION" \
            --field release_tool="$RELEASE_TOOL" \
            --field enable_repo_settings="$ENABLE_REPO_SETTINGS" \
            --field enable_codeowners="$ENABLE_CODEOWNERS" \
            --field workflows="$WORKFLOWS" \
            --field cleanup_on_failure="true"
          DISPATCH_ACTOR=$(gh api /user --jq '.login')
          if [ -z "$DISPATCH_ACTOR" ]; then
            echo "::error::Failed to resolve dispatch actor from GH_TOKEN; cannot correlate workflow run"
            exit 1
          fi
          echo "workflow_triggered_at=$TRIGGERED_AT" >> "$GITHUB_OUTPUT"
          echo "dispatch_actor=$DISPATCH_ACTOR" >> "$GITHUB_OUTPUT"

      - name: Monitor workflow execution
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          WORKFLOW_FILE: ${{ steps.validate-inputs.outputs.target_workflow }}
          TARGET_REF: ${{ steps.validate-inputs.outputs.target_ref }}
          REPOSITORY: ${{ github.repository }}
          TRIGGERED_AT: ${{ steps.trigger-workflow.outputs.workflow_triggered_at }}
          DISPATCH_ACTOR: ${{ steps.trigger-workflow.outputs.dispatch_actor }}
        timeout-minutes: 10
        run: |
          echo "⏳ Monitoring ${WORKFLOW_FILE} on ref ${TARGET_REF} (dispatch actor: ${DISPATCH_ACTOR})..."

          # Wait a moment for the workflow to be registered
          sleep 5

          # Poll for the workflow run
          for i in {1..60}; do
            # Find a workflow_dispatch run started after this job triggered the dispatch.
            # This avoids relying on branch-only filtering so tag refs are supported.
            RUN_STATUS=$(gh api \
              "/repos/${REPOSITORY}/actions/workflows/${WORKFLOW_FILE}/runs?per_page=20&event=workflow_dispatch" \
              | jq -c --arg ref "$TARGET_REF" --arg since "$TRIGGERED_AT" --arg actor "$DISPATCH_ACTOR" '
                  [.workflow_runs[]
                  | select(.head_branch == $ref)
                  | select(.created_at >= $since)
                  | select(.actor.login == $actor)
                  | {status: .status, conclusion: .conclusion, html_url: .html_url}]
                  | first // {}')

            if [ "$RUN_STATUS" = "{}" ]; then
              echo "⏳ Waiting for matching workflow run to appear... (check $i/60)"
              sleep 10
              continue
            fi

            STATUS=$(echo "$RUN_STATUS" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_STATUS" | jq -r '.conclusion')
            WORKFLOW_URL=$(echo "$RUN_STATUS" | jq -r '.html_url')

            echo "Workflow status: $STATUS, conclusion: $CONCLUSION"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "✅ Repository creation workflow completed successfully"
                echo "Workflow: $WORKFLOW_URL"
                break
              else
                echo "❌ Repository creation workflow failed with conclusion: $CONCLUSION"
                echo "Workflow: $WORKFLOW_URL"
                exit 1
              fi
            else
              echo "⏳ Workflow still running... (check $i/60)"
              sleep 10
            fi

            if [ $i -eq 60 ]; then
              echo "❌ Workflow monitoring timed out"
              echo "Workflow: $WORKFLOW_URL"
              exit 1
            fi
          done

      - name: Verify repository was created
        id: verify-repo
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"

          if gh repo view ${{ github.repository_owner }}/${REPO_NAME} &>/dev/null; then
            echo "✅ Repository verified: https://github.com/${{ github.repository_owner }}/${REPO_NAME}"
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Repository not found after workflow completion"
            echo "created=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Validate repository structure
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          ENV_MANAGER="${{ steps.validate-inputs.outputs.env_manager }}"
          RAW_LANGUAGES="${{ steps.validate-inputs.outputs.languages }}"
          LANGUAGES="${{ steps.validate-inputs.outputs.normalized_languages }}"
          LANG_DIR="${{ steps.validate-inputs.outputs.root_language }}"

          echo "🔍 Validating repository structure..."

          # Check essential files exist
          REQUIRED_FILES=(
            ".github/workflows/lint.yml"
            ".github/CODEOWNERS"
            ".github/dependabot.yml"
            ".pre-commit-config.yaml"
            ".editorconfig"
            ".gitignore"
            ".gitattributes"
            "README.md"
            "LICENSE"
            "Makefile"
            "AGENT.md"
            "CLAUDE.md"
            ".github/copilot-instructions.md"
            ".github/instructions/project.instructions.md"
            ".github/instructions/prompt-quality.instructions.md"
            ".cursor/rules/project.mdc"
            ".windsurfrules"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${file}" >/dev/null 2>&1; then
              echo "✅ Found: ${file}"
            else
              echo "❌ Missing: ${file}"
              exit 1
            fi
          done

          if echo "$RAW_LANGUAGES" | grep -q ','; then
            echo "ℹ️ Multiple languages requested ($RAW_LANGUAGES). Root template uses first-language policy: $LANG_DIR"
          fi

          PROVIDER_DIR="templates/languages/$LANG_DIR/providers/$ENV_MANAGER"
          if [ ! -d "$PROVIDER_DIR" ]; then
            echo "❌ Missing provider template directory: $PROVIDER_DIR"
            exit 1
          fi

          if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/Makefile" >/dev/null 2>&1; then
            echo "✅ Found provider Makefile"
          else
            echo "❌ Missing provider Makefile"
            exit 1
          fi

          for tooling_file in environment.yml mise.toml; do
            if [ -f "$PROVIDER_DIR/$tooling_file" ]; then
              if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${tooling_file}" >/dev/null 2>&1; then
                echo "✅ Found provider file for ${ENV_MANAGER}: ${tooling_file}"
              else
                echo "❌ Missing provider file for ${ENV_MANAGER}: ${tooling_file}"
                exit 1
              fi
            fi
          done

          SELECTED_LANGS=()
          IFS=',' read -ra LANG_INPUTS <<< "$LANGUAGES"
          for normalized in "${LANG_INPUTS[@]}"; do
            normalized=$(echo "$normalized" | xargs | tr '[:upper:]' '[:lower:]')
            if [ "$normalized" = "" ] || [ "$normalized" = "agnostic" ]; then
              continue
            fi
            SELECTED_LANGS+=("$normalized")
          done

          # De-duplicate while preserving order.
          UNIQUE_LANGS=()
          for lang in "${SELECTED_LANGS[@]}"; do
            if [[ ! " ${UNIQUE_LANGS[*]} " =~ " ${lang} " ]]; then
              UNIQUE_LANGS+=("$lang")
            fi
          done

          for lang in "${UNIQUE_LANGS[@]}"; do
            lang_config_path=".pre-commit/languages/${lang}.yaml"
            if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${lang_config_path}" >/dev/null 2>&1; then
              echo "✅ Found language pre-commit config: ${lang_config_path}"
            else
              echo "❌ Missing language pre-commit config: ${lang_config_path}"
              exit 1
            fi
          done

          FORBIDDEN_TEMPLATE_PATHS=(
            "languages"
            "providers"
            ".github/workflows/providers"
          )

          for path in "${FORBIDDEN_TEMPLATE_PATHS[@]}"; do
            if gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/${path}" >/dev/null 2>&1; then
              echo "❌ Unexpected template-only path found: ${path}"
              exit 1
            else
              echo "✅ Absent template-only path: ${path}"
            fi
          done

          echo "🎉 All required files are present!"

      - name: Validate API parity for settings and rulesets
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"
          ENABLE_REPO_SETTINGS="${{ steps.validate-inputs.outputs.enable_repo_settings }}"

          echo "🔍 Validating API-level repository settings parity..."

          REPO_JSON=$(gh api "/repos/${OWNER}/${REPO_NAME}")
          DEFAULT_BRANCH=$(echo "$REPO_JSON" | jq -r '.default_branch // "main"')

          for assertion in \
            '.has_wiki == true' \
            '.has_projects == true' \
            '.has_issues == true' \
            '.allow_auto_merge == true' \
            '.allow_update_branch == true' \
            '.allow_squash_merge == true' \
            '.allow_merge_commit == false' \
            '.allow_rebase_merge == false' \
            '.squash_merge_commit_title == "PR_TITLE"' \
            '.squash_merge_commit_message == "COMMIT_MESSAGES"' \
            '.delete_branch_on_merge == true'; do
            if ! echo "$REPO_JSON" | jq -e "$assertion" >/dev/null; then
              echo "❌ Repository setting assertion failed: $assertion"
              exit 1
            fi
          done

          echo "✅ Repository settings parity checks passed"

          RULESETS_JSON=$(gh api --paginate "/repos/${OWNER}/${REPO_NAME}/rulesets" 2>/dev/null || true)
          DEFAULT_RULESET_ID=$(echo "$RULESETS_JSON" | jq -r '.[]? | select(.name == "default" and .target == "branch") | .id' | head -n1)

          if [ -z "$DEFAULT_RULESET_ID" ]; then
            echo "❌ Missing default branch ruleset"
            exit 1
          fi

          DEFAULT_RULESET=$(gh api "/repos/${OWNER}/${REPO_NAME}/rulesets/${DEFAULT_RULESET_ID}" 2>/dev/null || true)

          if [ -z "$DEFAULT_RULESET" ]; then
            echo "❌ Failed to load default branch ruleset details"
            exit 1
          fi

          if ! echo "$DEFAULT_RULESET" | jq -e '.enforcement == "active"' >/dev/null; then
            echo "❌ Default ruleset is not active"
            exit 1
          fi

          if ! echo "$DEFAULT_RULESET" | jq -e --arg default_ref "refs/heads/${DEFAULT_BRANCH}" '(.conditions.ref_name.include | index("~DEFAULT_BRANCH") != null) or (.conditions.ref_name.include | index($default_ref) != null) or (any(.conditions.ref_name.include[]?; startswith("refs/heads/")))' >/dev/null; then
            echo "❌ Default ruleset does not target the repository default branch"
            exit 1
          fi

          if ! echo "$DEFAULT_RULESET" | jq -e '.rules[]? | select(.type == "pull_request") | (.parameters.required_approving_review_count == 2 and .parameters.require_code_owner_review == true and .parameters.required_review_thread_resolution == true)' >/dev/null; then
            echo "❌ Pull request review requirements do not match expected defaults"
            exit 1
          fi

          if ! echo "$DEFAULT_RULESET" | jq -e '.rules[]? | select(.type == "required_linear_history")' >/dev/null; then
            echo "❌ required_linear_history rule missing"
            exit 1
          fi

          if ! echo "$DEFAULT_RULESET" | jq -e '.rules[]? | select(.type == "required_status_checks") | (.parameters.required_status_checks[]?.context == "lint")' >/dev/null; then
            echo "❌ lint status check requirement missing"
            exit 1
          fi

          echo "✅ Ruleset parity checks passed"

          case "$ENABLE_REPO_SETTINGS" in
            "true")
              if ! gh api "/repos/${OWNER}/${REPO_NAME}/environments/dev" >/dev/null 2>&1; then
                echo "❌ Missing dev environment when enable_repo_settings=true"
                exit 1
              fi
              if ! gh api "/repos/${OWNER}/${REPO_NAME}/environments/prod" >/dev/null 2>&1; then
                echo "❌ Missing prod environment when enable_repo_settings=true"
                exit 1
              fi
              if ! gh api "/repos/${OWNER}/${REPO_NAME}/automated-security-fixes" >/dev/null 2>&1; then
                echo "❌ Dependabot automated security fixes not enabled when enable_repo_settings=true"
                exit 1
              fi
              echo "✅ Environment and Dependabot checks passed for enable_repo_settings=true"
              ;;
            *)
              echo "ℹ️ enable_repo_settings=false: skipping strict environment/dependabot assertions"
              ;;
          esac

      - name: Validate agent kit structure
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"
          ERRORS=0

          echo "Validating agent kit structure..."

          # Check .github/agents/ has the expected agent files
          GH_AGENTS=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.github/agents" --jq '.[].name' 2>/dev/null | wc -l)
          if [ "$GH_AGENTS" -ge 29 ]; then
            echo "✅ .github/agents/: ${GH_AGENTS} agent files"
          else
            echo "❌ .github/agents/: expected >= 29, found ${GH_AGENTS}"
            ERRORS=$((ERRORS + 1))
          fi

          # Check .claude/agents/ has the expected agent files
          CLAUDE_AGENTS=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.claude/agents" --jq '.[].name' 2>/dev/null | wc -l)
          if [ "$CLAUDE_AGENTS" -ge 29 ]; then
            echo "✅ .claude/agents/: ${CLAUDE_AGENTS} agent files"
          else
            echo "❌ .claude/agents/: expected >= 29, found ${CLAUDE_AGENTS}"
            ERRORS=$((ERRORS + 1))
          fi

          # Check .github/skills/ has the expected skill directories
          GH_SKILLS=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.github/skills" --jq '.[].name' 2>/dev/null | wc -l)
          if [ "$GH_SKILLS" -ge 32 ]; then
            echo "✅ .github/skills/: ${GH_SKILLS} skill directories"
          else
            echo "❌ .github/skills/: expected >= 32, found ${GH_SKILLS}"
            ERRORS=$((ERRORS + 1))
          fi

          # Check .claude/skills/ has the expected skill directories
          CLAUDE_SKILLS=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.claude/skills" --jq '.[].name' 2>/dev/null | wc -l)
          if [ "$CLAUDE_SKILLS" -ge 32 ]; then
            echo "✅ .claude/skills/: ${CLAUDE_SKILLS} skill directories"
          else
            echo "❌ .claude/skills/: expected >= 32, found ${CLAUDE_SKILLS}"
            ERRORS=$((ERRORS + 1))
          fi

          # Spot-check: verify a skill file has real content (not empty symlink artifact)
          SKILL_CONTENT=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.claude/skills/security-review/SKILL.md" --jq '.size' 2>/dev/null)
          if [ "$SKILL_CONTENT" -gt 100 ] 2>/dev/null; then
            echo "✅ .claude/skills/security-review/SKILL.md has content (${SKILL_CONTENT} bytes)"
          else
            echo "❌ .claude/skills/security-review/SKILL.md is empty or missing (symlink may not have been preserved)"
            ERRORS=$((ERRORS + 1))
          fi

          # Spot-check: verify an agent file has real content
          AGENT_CONTENT=$(gh api "/repos/${OWNER}/${REPO_NAME}/contents/.github/agents/security-reviewer.agent.md" --jq '.size' 2>/dev/null)
          if [ "$AGENT_CONTENT" -gt 100 ] 2>/dev/null; then
            echo "✅ .github/agents/security-reviewer.agent.md has content (${AGENT_CONTENT} bytes)"
          else
            echo "❌ .github/agents/security-reviewer.agent.md is empty or missing"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Agent kit validation failed with ${ERRORS} error(s)"
            exit 1
          fi
          echo "Agent kit structure verified"

      - name: Verify no stale Super-Linter artifacts
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"

          echo "Checking for stale Super-Linter artifacts..."

          # These files must NOT exist
          FORBIDDEN_FILES=(
            ".super-linter.env"
            ".github/workflows/super-linter.yml"
          )

          for file in "${FORBIDDEN_FILES[@]}"; do
            if gh api "/repos/${OWNER}/${REPO_NAME}/contents/${file}" >/dev/null 2>&1; then
              echo "❌ Stale artifact found: ${file}"
              exit 1
            else
              echo "✅ Absent (correct): ${file}"
            fi
          done

          echo "No stale Super-Linter artifacts found"

      - name: Check pre-commit configuration
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"

          echo "🔍 Checking pre-commit configuration for languages: ${{ github.event.inputs.languages }}"

          # Get the .pre-commit-config.yaml content
          PRECOMMIT_CONFIG=$(gh api "/repos/${{ github.repository_owner }}/${REPO_NAME}/contents/.pre-commit-config.yaml" --jq '.content' | base64 -d)

          echo "Pre-commit configuration:"
          echo "$PRECOMMIT_CONFIG"

          # Verify essential hooks are present
          if echo "$PRECOMMIT_CONFIG" | grep -q "trailing-whitespace"; then
            echo "✅ Core pre-commit hooks configured"
          else
            echo "❌ Core pre-commit hooks missing"
            exit 1
          fi

          if echo "$PRECOMMIT_CONFIG" | grep -q "conventional-pre-commit"; then
            echo "✅ Conventional commits hook configured"
          else
            echo "❌ Conventional commits hook missing"
            exit 1
          fi

      - name: Trigger lint workflow
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${OWNER}/${REPO_NAME}/actions/workflows/lint.yml/dispatches" \
            -f ref="main"

          echo "✅ Lint workflow dispatched"
          echo "Check result: https://github.com/${OWNER}/${REPO_NAME}/actions"

      - name: Write job summary
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          PRESET: ${{ steps.validate-inputs.outputs.preset }}
          TARGET_WORKFLOW: ${{ steps.validate-inputs.outputs.target_workflow }}
        run: |
          REPO_NAME="${{ steps.generate-name.outputs.repo_name }}"
          OWNER="${{ github.repository_owner }}"
          REPO_URL="https://github.com/${OWNER}/${REPO_NAME}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Test Repository Created

          | Item | Status |
          |------|--------|
          | Repository | [${OWNER}/${REPO_NAME}](${REPO_URL}) |
          | Preset | \`${PRESET}\` |
          | Target workflow | \`${TARGET_WORKFLOW}\` |
          | Structure validation | ✅ Passed |
          | Agent kit (agents + skills) | ✅ Passed |
          | API parity (settings + rulesets) | ✅ Passed |
          | No stale Super-Linter artifacts | ✅ Passed |
          | Pre-commit config | ✅ Passed |
          | Lint workflow | Dispatched — [check result](${REPO_URL}/actions) |

          ### Next steps

          1. Verify the lint workflow passes in the test repo
          2. Open a PR to test the PR-triggered lint path
          3. Delete when done: \`gh repo delete ${OWNER}/${REPO_NAME} --yes\`
          EOF

  cleanup-test-repo:
    name: Cleanup Test Repository
    needs: create-test-repo
    runs-on: ubuntu-latest
    if: >-
      ${{ always() &&
      (github.event.inputs.cleanup_after_test == 'true' ||
      needs.create-test-repo.result == 'failure') }}
    permissions:
      contents: write

    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v7

      - name: Resolve GitHub token
        id: resolve-token
        uses: ./.github/actions/resolve-gh-token
        with:
          gh_token: ${{ github.event.inputs.gh_token }}
          gh_pat_secret: ${{ secrets.GH_PAT }}

      - name: Delete test repository
        env:
          GH_TOKEN: ${{ steps.resolve-token.outputs.token }}
        run: |
          REPO_NAME="${{ needs.create-test-repo.outputs.test_repo_name }}"
          OWNER="${{ github.repository_owner }}"

          echo "Cleaning up test repository: ${OWNER}/${REPO_NAME}"

          if gh repo view "${OWNER}/${REPO_NAME}" &>/dev/null; then
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              /repos/${OWNER}/${REPO_NAME}

            echo "✅ Repository deleted successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Repository does not exist or was already deleted" >> $GITHUB_STEP_SUMMARY
          fi
