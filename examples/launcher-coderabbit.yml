---
# CodeRabbit-Only Setup Launcher
#
# Copy this file to .github/workflows/setup-coderabbit.yml in your launcher
# repository and replace BOOTSTRAP_OWNER with the owner of github-bootstrap.
# The target repository must have the CodeRabbit GitHub App installed for
# CodeRabbit reviews to run.
#
# Create these in THIS launcher repository, not in the target repo:
# - Secret: BOOTSTRAP_APP_PRIVATE_KEY
# - Workflow input: app_id
# - Optional workflow input: allowed_repo_owners
# The GitHub App or PAT must have access to the target repository selected by
# repo_owner/repo_name.

name: Setup CodeRabbit

on:
  workflow_dispatch:
    inputs:
      repo_owner:
        description: "Target owner - GitHub user or organization"
        required: true
        type: string
      repo_name:
        description: "Existing repository name"
        required: true
        type: string
      app_id:
        description: "GitHub App ID used to configure the target repository"
        required: true
        type: string
      allowed_repo_owners:
        description: "Optional comma-separated allowlist of target owners"
        required: false
        type: string
      mode:
        description: "CodeRabbit apply mode"
        required: false
        default: pull-request
        type: choice
        options:
          - plan
          - pull-request
          - direct
      include_labels:
        description: "Apply default labels"
        required: false
        default: true
        type: boolean
      include_ruleset:
        description: "Require CodeRabbit status check"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  setup-coderabbit:
    uses: BOOTSTRAP_OWNER/github-bootstrap/.github/workflows/setup-coderabbit.yml@main
    with:
      repo_owner: ${{ inputs.repo_owner }}
      repo_name: ${{ inputs.repo_name }}
      mode: ${{ inputs.mode }}
      include_labels: ${{ inputs.include_labels }}
      include_ruleset: ${{ inputs.include_ruleset }}
      app_id: ${{ inputs.app_id }}
      app_owner: ${{ inputs.repo_owner }}
      allowed_repo_owners: ${{ inputs.allowed_repo_owners }}
    secrets:
      app_private_key: ${{ secrets.BOOTSTRAP_APP_PRIVATE_KEY }}
