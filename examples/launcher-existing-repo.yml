---
# Existing Repository Setup Launcher
#
# Copy this file to .github/workflows/setup-existing-repository.yml in your
# launcher repository and replace BOOTSTRAP_OWNER with the owner of this
# github-bootstrap repository.
#
# Recommended auth:
# - Create these in THIS launcher repository, not in the target repo:
#   - Secret: BOOTSTRAP_APP_PRIVATE_KEY
#   - Workflow input: app_id
#   - Optional workflow input: allowed_repo_owners
# The GitHub App or PAT must have access to the target repository selected by
# repo_owner/repo_name.

name: Setup Existing Repository

on:
  workflow_dispatch:
    inputs:
      repo_owner:
        description: "Target owner - GitHub user or organization"
        required: true
        type: string
      repo_name:
        description: "Existing repository name"
        required: true
        type: string
      app_id:
        description: "GitHub App ID used to configure the target repository"
        required: true
        type: string
      allowed_repo_owners:
        description: "Optional comma-separated allowlist of target owners"
        required: false
        type: string
      apply_labels:
        description: "Apply default labels"
        required: false
        default: true
        type: boolean
      apply_security_settings:
        description: "Apply default security settings"
        required: false
        default: false
        type: boolean
      ruleset_profile:
        description: "Ruleset profile"
        required: false
        default: none
        type: choice
        options:
          - none
          - minimal
          - default
          - coderabbit
      coderabbit_mode:
        description: "CodeRabbit apply mode"
        required: false
        default: none
        type: choice
        options:
          - none
          - plan
          - pull-request
          - direct
      agent_provider:
        description: "Agent instructions provider"
        required: false
        default: none
        type: choice
        options:
          - none
          - copilot
          - claude
          - cursor
          - windsurf
          - codex
          - all

permissions:
  contents: read

jobs:
  setup:
    uses: BOOTSTRAP_OWNER/github-bootstrap/.github/workflows/setup-existing-repository.yml@main
    with:
      repo_owner: ${{ inputs.repo_owner }}
      repo_name: ${{ inputs.repo_name }}
      apply_labels: ${{ inputs.apply_labels }}
      apply_security_settings: ${{ inputs.apply_security_settings }}
      ruleset_profile: ${{ inputs.ruleset_profile }}
      coderabbit_mode: ${{ inputs.coderabbit_mode }}
      agent_provider: ${{ inputs.agent_provider }}
      app_id: ${{ inputs.app_id }}
      app_owner: ${{ inputs.repo_owner }}
      allowed_repo_owners: ${{ inputs.allowed_repo_owners }}
    secrets:
      app_private_key: ${{ secrets.BOOTSTRAP_APP_PRIVATE_KEY }}
