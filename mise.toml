[tools]
python = "3.13"
node = "24"
go = "1.26"
shfmt = "3.13.1"
terraform = "1.15.6"
shellcheck = "0.11.0"
taplo = "0.10.0"

[tasks.install-tools]
run = [
  "python -m pip install --upgrade pip",
  "python -m pip install pre-commit==4.6.0 editorconfig-checker==3.6.1 yamllint==1.38.0",
  "npm install -g prettier@3.9.4 markdownlint-cli@0.49.0",
]
