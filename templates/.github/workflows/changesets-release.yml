---
# Changesets release workflow: PR-based versioning and changelog generation for monorepos.
#
# Workflow:
#   1. A developer creates a changeset: npx changeset
#   2. On push to main this action opens a "Version Packages" PR
#      that applies all pending changesets (version bumps + changelogs)
#   3. Merging the version PR creates GitHub Releases for each changed package
#
# Stars: 11k+  See: https://github.com/changesets/changesets
#
# NOTE: This workflow is designed for JavaScript/TypeScript projects.
# For non-JS projects, prefer git-cliff or semantic-release.
name: Release (Changesets)

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        # --ignore-scripts prevents malicious lifecycle scripts from running during install
        run: npm ci --ignore-scripts

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1.7.0
        with:
          title: "chore: version packages"
          commit: "chore: version packages [skip ci]"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
