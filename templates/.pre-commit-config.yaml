---
# Pre-commit hooks for local formatting and validation.
#
# Quick start:
#   make install-hooks          # installs hooks once
#   pre-commit run --all-files  # run against all files manually
#
# Hooks run automatically on `git commit` and `git commit --message`.
# They mirror what super-linter enforces in CI, so PRs arrive already formatted.

repos:
  # ── Basic file hygiene ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "\\.(md)$" # markdownlint manages trailing spaces in .md files
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe] # allow custom YAML tags used in some workflows
      - id: check-json

  # ── Prettier (JSON / YAML) ───────────────────────────────────────────────────
  # Mirrors FIX_JSON_PRETTIER, FIX_YAML_PRETTIER in CI.
  # Markdown is handled exclusively by markdownlint (see markdownlint hook above).
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
      - id: prettier
        types_or: [yaml, json]

  # ── Shell formatting (shfmt) ──────────────────────────────────────────────────
  # Mirrors FIX_SHELL_SHFMT in CI.
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: [--write]

  # ── Conventional commit messages ──────────────────────────────────────────────
  # Mirrors VALIDATE_GIT_COMMITLINT in CI; runs only on the commit-msg stage.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          [
            feat,
            fix,
            docs,
            style,
            refactor,
            perf,
            test,
            build,
            ci,
            chore,
            revert,
          ]
