[tools]
python = "{{PYTHON_VERSION}}"
node = "{{NODE_VERSION}}"
shellcheck = "0.11.0"
shfmt = "3.13.1"
terraform = "1.15.6"
taplo = "0.9.3"

[tasks.install-tools]
run = [
  "python -m pip install --upgrade pip",
  "python -m pip install pre-commit==4.6.0 editorconfig-checker==3.6.1 yamllint==1.38.0 ruff mypy types-PyYAML pytest pytest-cov pytest-mock",
  "npm install -g prettier@3.9.3 markdownlint-cli@0.49.0",
]
